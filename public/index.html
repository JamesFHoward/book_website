<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bookshelf</title>
<link rel="stylesheet" href="/style.css">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1F3D2E">
<style>
.pw-wrap { position:relative; margin-bottom:12px; }
.pw-wrap input { margin-bottom:0; padding-right:44px; }
.pw-toggle {
  position:absolute; right:0; top:0; bottom:0;
  width:42px; background:none; border:none; padding:0;
  display:flex; align-items:center; justify-content:center;
  color:#9a8e78; cursor:pointer; border-radius:0 4px 4px 0;
}
.pw-toggle:hover { color:var(--forest); }
.pw-toggle svg { width:18px; height:18px; pointer-events:none; }
</style>
</head>
<body class="auth-body">

<div class="auth-card">
  <h1 style="text-align:center;margin:0 0 8px;font-size:36px;">Bookshelf</h1>
  <p style="text-align:center;color:#857c68;font-style:italic;margin:0 0 28px;font-size:16px;">Track what you read. Discover what's next.</p>

  <div class="auth-tabs">
    <button class="auth-tab active" id="tabLogin">Sign in</button>
    <button class="auth-tab" id="tabRegister">Create account</button>
  </div>

  <!-- Login form -->
  <form id="loginForm">
    <label style="font-size:15px;color:#5b5448;display:block;margin-bottom:5px;">Username</label>
    <input type="text" id="loginUser" autocomplete="username" required placeholder="your username">
    <label style="font-size:15px;color:#5b5448;display:block;margin-bottom:5px;">Password</label>
    <div class="pw-wrap">
      <input type="password" id="loginPass" autocomplete="current-password" required placeholder="your password">
      <button type="button" class="pw-toggle" aria-label="Show password" onclick="togglePw('loginPass',this)">
        <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        <svg class="eye-off-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
      </button>
    </div>
    <div class="error" id="loginErr"></div>
    <button class="btn-primary" type="submit" style="margin-top:16px;">Sign in</button>
    <p style="text-align:center;margin:14px 0 0;">
      <a href="/reset-password.html" style="font-size:14px;color:#857c68;text-decoration:underline;">Forgot password?</a>
    </p>
  </form>

  <!-- Register form -->
  <form id="registerForm" style="display:none">
    <label style="font-size:15px;color:#5b5448;display:block;margin-bottom:5px;">Username</label>
    <input type="text" id="regUser" autocomplete="username" required placeholder="choose a username" maxlength="30">
    <label style="font-size:15px;color:#5b5448;display:block;margin-bottom:5px;">Email</label>
    <input type="email" id="regEmail" autocomplete="email" placeholder="you@example.com" required>
    <label style="font-size:15px;color:#5b5448;display:block;margin-bottom:5px;">Password</label>
    <div class="pw-wrap">
      <input type="password" id="regPass" autocomplete="new-password" required placeholder="8+ characters, letter and number" minlength="8">
      <button type="button" class="pw-toggle" aria-label="Show password" onclick="togglePw('regPass',this)">
        <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        <svg class="eye-off-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
      </button>
    </div>
    <div class="error" id="regErr"></div>
    <button class="btn-primary" type="submit" style="margin-top:16px;">Create account</button>
  </form>
</div>

<script>
if(localStorage.getItem('darkMode')==='true')document.documentElement.classList.add('dark');
function togglePw(id, btn) {
  const input = document.getElementById(id);
  const showing = input.type === 'text';
  input.type = showing ? 'password' : 'text';
  btn.querySelector('.eye-icon').style.display     = showing ? '' : 'none';
  btn.querySelector('.eye-off-icon').style.display = showing ? 'none' : '';
  btn.setAttribute('aria-label', showing ? 'Show password' : 'Hide password');
}

// Redirect if already logged in
fetch('/api/me').then(r=>r.json()).then(d => {
  if (d.loggedIn) window.location.href = '/app.html';
});

// Tab switching
const tabLogin    = document.getElementById('tabLogin');
const tabRegister = document.getElementById('tabRegister');
const loginForm   = document.getElementById('loginForm');
const registerForm= document.getElementById('registerForm');

tabLogin.addEventListener('click', () => {
  tabLogin.classList.add('active'); tabRegister.classList.remove('active');
  loginForm.style.display = ''; registerForm.style.display = 'none';
});
tabRegister.addEventListener('click', () => {
  tabRegister.classList.add('active'); tabLogin.classList.remove('active');
  registerForm.style.display = ''; loginForm.style.display = 'none';
});

// Login
loginForm.addEventListener('submit', async e => {
  e.preventDefault();
  const btn = loginForm.querySelector('button[type=submit]');
  const err = document.getElementById('loginErr');
  btn.disabled = true; btn.textContent = 'Signing in…'; err.textContent = '';
  try {
    const res = await fetch('/api/login', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ username: loginUser.value.trim(), password: loginPass.value }),
    });
    const data = await res.json();
    if (data.ok) { window.location.href = '/app.html'; return; }
    err.textContent = data.error || 'Login failed.';
  } catch { err.textContent = 'Network error. Try again.'; }
  btn.disabled = false; btn.textContent = 'Sign in';
});

// Register
registerForm.addEventListener('submit', async e => {
  e.preventDefault();
  const btn = registerForm.querySelector('button[type=submit]');
  const err = document.getElementById('regErr');
  btn.disabled = true; btn.textContent = 'Creating…'; err.textContent = '';
  try {
    const res = await fetch('/api/register', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ username: regUser.value.trim(), email: regEmail.value.trim(), password: regPass.value }),
    });
    const data = await res.json();
    if (data.ok) { window.location.href = '/app.html'; return; }
    err.textContent = data.error || 'Registration failed.';
  } catch { err.textContent = 'Network error. Try again.'; }
  btn.disabled = false; btn.textContent = 'Create account';
});
</script>
</body>
</html>
