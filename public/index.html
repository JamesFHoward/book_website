<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bookshelf — Sign in</title>
<link rel="stylesheet" href="/style.css">
<style>
@keyframes cardIn {
  from { opacity:0; transform:translateY(22px) scale(0.98); }
  to   { opacity:1; transform:translateY(0)    scale(1);    }
}
@keyframes shake {
  0%,100% { transform:translateX(0); }
  20%,60% { transform:translateX(-7px); }
  40%,80% { transform:translateX(7px); }
}
.auth-card {
  animation: cardIn 0.55s cubic-bezier(0.22,1,0.36,1) both;
}
input[type="text"],
input[type="password"] {
  transition: border-color 0.15s, box-shadow 0.2s;
}
input[type="text"]:focus,
input[type="password"]:focus {
  box-shadow: 0 0 0 4px rgba(201,162,39,0.18);
}
.btn-primary {
  transition: background 0.15s, transform 0.12s, box-shadow 0.15s;
}
.btn-primary:not(:disabled):hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 16px rgba(31,61,46,0.28);
}
.btn-primary:not(:disabled):active {
  transform: translateY(0);
  box-shadow: none;
}
.btn-primary:disabled {
  opacity: 0.65;
  cursor: default;
}
.auth-tab {
  transition: color 0.2s, border-bottom-color 0.2s;
}
.error.shake {
  animation: shake 0.38s ease;
}
</style>
</head>
<body class="auth-body" data-bg-pages="true">
<div class="auth-card">
  <h1>Bookshelf</h1>
  <p class="tagline">Track what you've read — and what's next.</p>

  <div class="auth-tabs">
    <button class="auth-tab active" data-mode="login">Sign in</button>
    <button class="auth-tab" data-mode="register">Create account</button>
  </div>

  <form id="authForm">
    <input type="text" id="username" placeholder="Username" autocomplete="username" required>
    <input type="password" id="password" placeholder="Password" autocomplete="current-password" required>
    <button type="submit" class="btn-primary" id="submitBtn">Sign in</button>
  </form>

  <p class="error" id="errorMsg"></p>
</div>

<script>
let mode = 'login';

document.querySelectorAll('.auth-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    mode = tab.dataset.mode;
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.toggle('active', t === tab));
    document.getElementById('submitBtn').textContent = mode === 'login' ? 'Sign in' : 'Create account';
    document.getElementById('password').autocomplete = mode === 'login' ? 'current-password' : 'new-password';
    document.getElementById('errorMsg').textContent = '';
  });
});

document.getElementById('authForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const username  = document.getElementById('username').value.trim();
  const password  = document.getElementById('password').value;
  const errorMsg  = document.getElementById('errorMsg');
  const submitBtn = document.getElementById('submitBtn');
  const label     = mode === 'login' ? 'Sign in' : 'Create account';

  errorMsg.textContent = '';
  errorMsg.classList.remove('shake');
  submitBtn.disabled    = true;
  submitBtn.textContent = mode === 'login' ? 'Signing in…' : 'Creating account…';

  try {
    const res  = await fetch(`/api/${mode === 'login' ? 'login' : 'register'}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (!res.ok) {
      errorMsg.textContent = data.error || 'Something went wrong.';
      void errorMsg.offsetWidth; // restart animation
      errorMsg.classList.add('shake');
      submitBtn.disabled    = false;
      submitBtn.textContent = label;
      return;
    }
    window.location.href = '/app.html';
  } catch (err) {
    errorMsg.textContent  = 'Could not reach the server. Try again.';
    void errorMsg.offsetWidth;
    errorMsg.classList.add('shake');
    submitBtn.disabled    = false;
    submitBtn.textContent = label;
  }
});

// If already logged in, skip straight to the app.
fetch('/api/me').then(r => r.json()).then(data => {
  if (data.loggedIn) window.location.href = '/app.html';
});
</script>

<script src="/background.js"></script>
</body>
</html>
