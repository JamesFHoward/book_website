      : book.cover_isbn
      ? `https://covers.openlibrary.org/b/isbn/${book.cover_isbn}-M.jpg`
      : null;
    const note = book.note || '';
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="cover">
        ${cover ? `<img src="${escHtml(cover)}" alt="${escHtml(book.title)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">` : ''}
        <span class="cover-fallback"${cover ? ' style="display:none"' : ''}>${escHtml((book.title||'?')[0])}</span>
      </div>
      <div class="info">
        <div class="title">${escHtml(book.title)}</div>
        <div class="author">${escHtml(book.author || 'Unknown author')}</div>
        <div class="actions">
          <button class="pill remove" data-action="dnf-remove">Remove</button>
        </div>
        <div class="note-area">
          <div class="note-display" style="display:${note ? 'block' : 'none'}">${escHtml(note)}</div>
          <button class="note-toggle">${note ? '✏ Edit note' : '✏ Add note'}</button>
          <div class="note-editor" style="display:none">
            <textarea class="note-ta" placeholder="Why did you stop reading?">${escHtml(note)}</textarea>
            <div class="note-btns">
              <button class="note-save">Save</button>
              <button class="note-cancel">Cancel</button>
            </div>
          </div>
        </div>
      </div>
    `;
    card.querySelector('[data-action="dnf-remove"]').addEventListener('click', async () => {
      await fetch(`/api/dnf/${encodeURIComponent(book.key)}`, { method: 'DELETE' });
      dnfList = dnfList.filter(b => b.key !== book.key);
      updateCounts(); renderDnf();
    });
    const noteToggle = card.querySelector('.note-toggle');
    const noteEditor = card.querySelector('.note-editor');
    const noteDisplay = card.querySelector('.note-display');
    const noteTa = card.querySelector('.note-ta');
    const noteSave = card.querySelector('.note-save');
    const noteCancel = card.querySelector('.note-cancel');
    noteToggle.addEventListener('click', () => { noteEditor.style.display = 'block'; noteToggle.style.display = 'none'; noteTa.focus(); });
    noteCancel.addEventListener('click', () => { noteTa.value = book.note || ''; noteEditor.style.display = 'none'; noteToggle.style.display = ''; });
    noteSave.addEventListener('click', async () => {
      const newNote = noteTa.value.trim();
      noteSave.disabled = true; noteSave.textContent = 'Saving…';
      await fetch('/api/dnf/note', { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ key: book.key, note: newNote }) });
      book.note = newNote || null;
      noteDisplay.textContent = newNote; noteDisplay.style.display = newNote ? 'block' : 'none';
      noteToggle.textContent = newNote ? '✏ Edit note' : '✏ Add note';
      noteEditor.style.display = 'none'; noteToggle.style.display = '';
      noteSave.disabled = false; noteSave.textContent = 'Save';
    });
    grid.appendChild(card);
  }
  content.appendChild(grid);
}

function renderCollections() {
  const content = document.getElementById('content');
  content.innerHTML = '';
  const wrap = document.createElement('div');

  const createForm = document.createElement('div');
  createForm.style.cssText = 'display:flex;gap:8px;margin-bottom:20px;';
  createForm.innerHTML = `<input type="text" id="newColName" placeholder="Collection name…" style="flex:1;margin-bottom:0;padding:9px 12px;font-size:14px;" maxlength="60"><button class="btn-primary" id="createColBtn" style="width:auto;padding:9px 18px;">Create</button>`;
  wrap.appendChild(createForm);

  const listEl = document.createElement('div');
  listEl.style.cssText = 'display:flex;flex-direction:column;gap:10px;';

  async function loadAndRenderCollections() {
    const r = await fetch('/api/collections');
    collections = r.ok ? await r.json() : [];
    listEl.innerHTML = '';
    if (!collections.length) {
      listEl.innerHTML = '<div class="empty">No collections yet. Create one above.</div>';
      return;
    }
    for (const col of collections) {
      const row = document.createElement('div');
      row.className = 'reading-card';
      row.style.cursor = 'pointer';
      row.innerHTML = `
        <div class="reading-body">
          <div class="reading-title">${escHtml(col.name)}</div>
          <div class="reading-actions" style="margin-top:8px;">
            <button class="reading-finish-btn col-view-btn">View books</button>
            <button class="reading-remove-btn col-del-btn">Delete</button>
          </div>
          <div class="col-books" style="display:none;margin-top:12px;"></div>
        </div>`;
      row.querySelector('.col-del-btn').addEventListener('click', async e => {
        e.stopPropagation();
        await fetch(`/api/collections/${col.id}`, { method: 'DELETE' });
        await loadAndRenderCollections();
      });
      row.querySelector('.col-view-btn').addEventListener('click', async e => {
        e.stopPropagation();
        const booksEl = row.querySelector('.col-books');
        if (booksEl.style.display !== 'none') { booksEl.style.display = 'none'; return; }
        booksEl.style.display = 'block';
        booksEl.innerHTML = '<em style="font-size:13px;color:#857c68;">Loading…</em>';
        const br = await fetch(`/api/collections/${col.id}/books`);
        if (booksEl.style.display === 'none') return;
        let colBooks = br.ok ? await br.json() : [];

        function renderColBooks() {
          booksEl.innerHTML = '';
          // Book list with remove buttons
          if (colBooks.length) {
            const bookList = document.createElement('div');
            bookList.style.cssText = 'display:flex;flex-direction:column;gap:2px;margin-bottom:10px;';
            colBooks.forEach(b => {
              const brow = document.createElement('div');
              brow.style.cssText = 'font-family:Georgia,serif;font-size:13.5px;color:var(--forest);padding:5px 0;border-bottom:1px solid #ece5d2;display:flex;justify-content:space-between;align-items:center;gap:8px;';
              const label = document.createElement('span');
              label.innerHTML = escHtml(b.title) + (b.author ? ` <span style="color:#9a8e78;font-style:italic;">— ${escHtml(b.author)}</span>` : '');
              const removeBtn = document.createElement('button');
              removeBtn.textContent = '✕';
              removeBtn.title = 'Remove from collection';
              removeBtn.style.cssText = 'background:none;border:none;color:#aaa;cursor:pointer;font-size:12px;padding:2px 5px;flex-shrink:0;line-height:1;';
              removeBtn.addEventListener('click', async () => {
                removeBtn.disabled = true;
                await fetch(`/api/collections/${col.id}/books/${encodeURIComponent(b.key)}`, { method: 'DELETE' });
                colBooks = colBooks.filter(cb => cb.key !== b.key);
                renderColBooks();
              });
              brow.appendChild(label);
              brow.appendChild(removeBtn);
              bookList.appendChild(brow);
            });
            booksEl.appendChild(bookList);
          } else {
            const empty = document.createElement('em');
            empty.style.cssText = 'font-size:13px;color:#857c68;display:block;margin-bottom:10px;';
            empty.textContent = 'No books in this collection yet.';
            booksEl.appendChild(empty);
          }
          // Add from shelf section
          const addSect = document.createElement('div');
          addSect.style.cssText = 'border-top:1px solid #ece5d2;padding-top:10px;';
          const addInput = document.createElement('input');
          addInput.type = 'text';
          addInput.className = 'col-add-input';
          addInput.placeholder = 'Add from your shelf…';
          const addResults = document.createElement('div');
          addResults.style.cssText = 'display:flex;flex-direction:column;gap:3px;max-height:160px;overflow-y:auto;';
          addInput.addEventListener('input', () => {
            const q = addInput.value.trim().toLowerCase();
            addResults.innerHTML = '';
            if (!q) return;
            const colKeys = new Set(colBooks.map(b => b.key));
            const seen = new Set();
            const candidates = [
              ...Object.entries(lists.want),
              ...Object.entries(lists.read),
              ...Object.entries(lists.fav),
            ].filter(([k, b]) => {
              if (colKeys.has(k) || seen.has(k)) return false;
              seen.add(k);
              return ((b.title||'').toLowerCase().includes(q) || (b.author||'').toLowerCase().includes(q));
            });
            candidates.slice(0, 10).forEach(([k, b]) => {
              const item = document.createElement('div');
              item.style.cssText = 'padding:5px 8px;cursor:pointer;border-radius:4px;font-family:Georgia,serif;font-size:13px;color:var(--forest);background:rgba(242,236,221,0.4);';
              item.textContent = b.title + (b.author ? ` — ${b.author}` : '');
              item.addEventListener('mouseenter', () => { item.style.background = 'rgba(31,61,46,0.08)'; });
              item.addEventListener('mouseleave', () => { item.style.background = 'rgba(242,236,221,0.4)'; });
              item.addEventListener('click', async () => {
                await fetch(`/api/collections/${col.id}/books`, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ key: k, title: b.title, author: b.author, cover_i: b.cover_i }),
                });
                colBooks.push({ key: k, title: b.title, author: b.author, cover_i: b.cover_i });
                renderColBooks();
              });
              addResults.appendChild(item);
            });
          });
          addSect.appendChild(addInput);
          addSect.appendChild(addResults);
          booksEl.appendChild(addSect);
        }
        renderColBooks();
      });
      listEl.appendChild(row);
    }
  }

  wrap.appendChild(listEl);
  content.appendChild(wrap);

  document.getElementById('createColBtn')?.addEventListener('click', async () => {
    const name = document.getElementById('newColName').value.trim();
    if (!name) return;
    await fetch('/api/collections', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name }) });
    document.getElementById('newColName').value = '';
    await loadAndRenderCollections();
  });
  document.getElementById('newColName')?.addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('createColBtn').click(); });

  loadAndRenderCollections();
}

function setActiveTabUI(tab){
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
}

document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', async () => {
    activeTab = t.dataset.tab;
    activeSort = 'date';
    setActiveTabUI(activeTab);
    if (activeTab === 'reading') {
      await loadReading();
      updateCounts();
    }
    renderActiveTab();
  });
});

document.getElementById('searchBtn').addEventListener('click', doSearch);
document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

// ── ISBN barcode scanner (multi-scan) ─────────────────────────────────────
document.getElementById('scanBtn').addEventListener('click', openScanner);

async function openScanner() {
  if (!navigator.mediaDevices?.getUserMedia) {
    const isbn = prompt('Enter ISBN to search:');
    if (isbn?.trim()) { document.getElementById('searchInput').value = isbn.trim(); doSearch(); }
    return;
  }

  const scannedISBNs = [];    // order-preserving list
  const scannedSet   = new Set();
  const resolved     = new Map(); // isbn → olBook
  let stream, interval;

  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:1000;display:flex;flex-direction:column;align-items:center;padding:20px 16px;overflow-y:auto;gap:10px;';
  overlay.innerHTML = `
    <p style="color:#fff;font-family:Georgia,serif;font-size:15px;margin:0;text-align:center;">Point camera at a barcode — keep scanning!</p>
    <video id="scanVideo" style="width:min(340px,90vw);border-radius:8px;background:#111;border:3px solid transparent;transition:border-color 0.25s;flex-shrink:0;" autoplay playsinline muted></video>
    <div id="scanStatus" style="color:#bbb;font-family:Georgia,serif;font-size:13px;text-align:center;min-height:18px;"></div>
    <div id="scanList" style="width:min(340px,90vw);display:flex;flex-direction:column;gap:6px;"></div>
    <div style="display:flex;gap:10px;padding-top:4px;flex-shrink:0;">
      <button id="scanDone" style="display:none;padding:11px 22px;background:#1F3D2E;color:#fff;border:none;border-radius:4px;font-family:Georgia,serif;font-size:14px;font-weight:600;cursor:pointer;"></button>
      <button id="scanCancel" style="padding:11px 22px;background:#fff;border:none;border-radius:4px;font-family:Georgia,serif;font-size:14px;cursor:pointer;">Cancel</button>
    </div>
  `;
  document.body.appendChild(overlay);

  const videoEl   = overlay.querySelector('#scanVideo');
  const statusEl  = overlay.querySelector('#scanStatus');
  const listEl    = overlay.querySelector('#scanList');
  const doneBtn   = overlay.querySelector('#scanDone');
  const cancelBtn = overlay.querySelector('#scanCancel');

  function cleanup() {
    clearInterval(interval);
    if (stream) stream.getTracks().forEach(t => t.stop());
    overlay.remove();
  }

  cancelBtn.addEventListener('click', cleanup);

  function updateDoneBtn() {
    const n = scannedISBNs.length;
    doneBtn.style.display = n ? '' : 'none';
    doneBtn.textContent   = `Done — add ${n} book${n !== 1 ? 's' : ''}`;
  }

  function flashGreen() {
    videoEl.style.borderColor = '#4caf50';
    setTimeout(() => { videoEl.style.borderColor = 'transparent'; }, 400);
  }

  function addEntry(isbn) {
    const row = document.createElement('div');
    row.style.cssText = 'background:rgba(255,255,255,0.10);border-radius:6px;padding:8px 12px;display:flex;gap:10px;align-items:center;';
    row.innerHTML = `
      <span style="color:#4caf50;font-size:15px;flex-shrink:0;">✓</span>
      <div style="flex:1;min-width:0;">
        <div data-title style="color:#fff;font-family:Georgia,serif;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${isbn}</div>
        <div data-author style="color:#999;font-family:Georgia,serif;font-size:11px;font-style:italic;"></div>
      </div>
    `;
    listEl.appendChild(row);

    // Resolve title in background
    fetch(`/api/search?q=isbn:${isbn}`)
      .then(r => r.json())
      .then(docs => {
        const ob = Array.isArray(docs) && docs[0];
        if (ob) {
          resolved.set(isbn, ob);
          row.querySelector('[data-title]').textContent  = ob.title || isbn;
          row.querySelector('[data-author]').textContent = (ob.author_name||[])[0] || '';
        }
      })
      .catch(() => {});
  }

  doneBtn.addEventListener('click', () => {
    cleanup();
    showScannedResults(scannedISBNs, resolved);
  });

  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    videoEl.srcObject = stream;
    await videoEl.play();

    if (!('BarcodeDetector' in window)) {
      // Camera works but barcode API unavailable (Firefox, Safari) — stop stream and ask for ISBN
      cleanup();
      const isbn = prompt('Barcode scanning is not supported in this browser. Enter an ISBN to search:');
      if (isbn?.trim()) { document.getElementById('searchInput').value = isbn.trim(); doSearch(); }
      return;
    }

    let detector;
    try {
      detector = new BarcodeDetector({ formats: ['ean_13', 'ean_8', 'code_128'] });
    } catch {
      cleanup();
      const isbn = prompt('Barcode detector failed to initialise. Enter an ISBN to search:');
      if (isbn?.trim()) { document.getElementById('searchInput').value = isbn.trim(); doSearch(); }
      return;
    }

    statusEl.textContent = 'Scanning…';

    interval = setInterval(async () => {
      try {
        const hits = await detector.detect(videoEl);
        if (!hits.length) return;
        const raw = hits[0].rawValue;
        if (scannedSet.has(raw)) return;
        scannedSet.add(raw);
        scannedISBNs.push(raw);
        flashGreen();
        navigator.vibrate?.(80);
        statusEl.textContent = `Scanned! Keep going or tap Done.`;
        addEntry(raw);
        updateDoneBtn();
      } catch (_) {}
    }, 400);

  } catch (err) {
    cleanup();
    const msg = err?.name === 'NotAllowedError' ? 'Camera access was denied.' : 'Could not start camera.';
    const isbn = prompt(`${msg} Enter an ISBN to search instead:`);
    if (isbn?.trim()) { document.getElementById('searchInput').value = isbn.trim(); doSearch(); }
  }
}

function showScannedResults(isbns, resolved) {
  const found    = isbns.filter(i => resolved.has(i)).map(i => resolved.get(i));
  const notFound = isbns.filter(i => !resolved.has(i));

  if (!found.length) {
    // Nothing resolved — fall back to single search
    document.getElementById('searchInput').value = isbns[0] || '';
    activeTab = 'search'; setActiveTabUI('search');
    doSearch();
    return;
  }

  lastResults = found;
  activeTab = 'search';
  setActiveTabUI('search');

  const content = document.getElementById('content');
  content.innerHTML = '';

  const banner = document.createElement('div');
  banner.style.cssText = 'font-family:Georgia,serif;font-size:13px;color:#5b5448;margin-bottom:16px;padding:10px 14px;background:#f0ebe0;border-radius:6px;';
  banner.textContent = `Scanned ${isbns.length} book${isbns.length !== 1 ? 's' : ''}` +
    (notFound.length ? ` — ${notFound.length} could not be identified` : '') + '.';
  content.appendChild(banner);

  const grid = document.createElement('div');
  grid.className = 'grid';
  for (const ob of found) grid.appendChild(renderCard(ob, bookKey(ob)));
  content.appendChild(grid);
}


(async () => {
  await checkAuth();
  await Promise.all([loadLists(), loadRecommendations(), loadReading(), loadDnf()]);
  updateCounts();
  renderActiveTab();
  prefetchMissingCovers();
})();
