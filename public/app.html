<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bookshelf</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div>
      <h1>Bookshelf</h1>
      <p class="tagline">Search, favorite, and track what you've read — and what's next.</p>
    </div>
    <div class="userchip" id="userchip"></div>
  </div>

  <div class="searchbar">
    <input type="text" id="searchInput" placeholder="Search by title or author…" autocomplete="off">
    <button class="btn-primary" id="searchBtn" style="width:auto;">Search</button>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="search">Search</button>
    <button class="tab" data-tab="want">Want to Read<span class="count" id="countWant">0</span></button>
    <button class="tab" data-tab="read">Already Read<span class="count" id="countRead">0</span></button>
    <button class="tab" data-tab="fav">Favorites<span class="count" id="countFav">0</span></button>
    <button class="tab" data-tab="recs">Recommendations</button>
  </div>

  <div id="content"></div>
</div>

<script>
let lists = { want: {}, read: {}, fav: {} };
let lastResults = [];
let recommendations = [];
let activeTab = 'search';

async function checkAuth(){
  const res = await fetch('/api/me');
  const data = await res.json();
  if (!data.loggedIn) { window.location.href = '/index.html'; return; }
  document.getElementById('userchip').innerHTML =
    `Signed in as <strong>${data.username}</strong><br><button id="logoutBtn">Sign out</button>`;
  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await fetch('/api/logout', { method: 'POST' });
    window.location.href = '/index.html';
  });
}

async function loadLists(){
  const res = await fetch('/api/lists');
  if (res.status === 401) { window.location.href = '/index.html'; return; }
  lists = await res.json();
  updateCounts();
}

async function loadRecommendations(){
  try {
    const res = await fetch('/recommendations.json');
    recommendations = await res.json();
  } catch (_) {
    recommendations = [];
  }
}

function updateCounts(){
  document.getElementById('countWant').textContent = Object.keys(lists.want).length;
  document.getElementById('countRead').textContent = Object.keys(lists.read).length;
  document.getElementById('countFav').textContent = Object.keys(lists.fav).length;
}

function bookKey(b){ return b.key || (b.title + '::' + (b.author_name ? b.author_name[0] : '')); }

function coverUrl(b){
  if (b.cover_i) return `https://covers.openlibrary.org/b/id/${b.cover_i}-M.jpg`;
  return null;
}

function starsHTML(current){
  let html = '<div class="rating-row">';
  for (let i = 1; i <= 5; i++){
    html += `<span class="rating-star${i <= current ? ' filled' : ''}" data-val="${i}" title="${i} star${i>1?'s':''}">★</span>`;
  }
  html += '</div>';
  return html;
}

function renderCard(b, idKey){
  const k = idKey;
  const cover = coverUrl(b);
  const inWant = !!lists.want[k];
  const inRead = !!lists.read[k];
  const inFav  = !!lists.fav[k];
  const author = b.author_name ? b.author_name.join(', ') : (b.author || 'Unknown author');
  const title  = b.title || '(untitled)';
  const rating = (activeTab === 'read' && lists.read[k]) ? (lists.read[k].rating || 0) : 0;

  const div = document.createElement('div');
  div.className = 'card';
  div.innerHTML = `
    ${inFav ? '<span class="star">⭐</span>' : ''}
    <div class="cover">${cover ? `<img src="${cover}" alt="Cover of ${title}">` : `<span class="cover-fallback">${title[0]}</span>`}</div>
    <div class="info">
      <div class="title">${title}</div>
      <div class="author">${author}</div>
      <div class="actions">
        <button class="pill ${inWant?'active':''}" data-action="want">${inWant?'✓ Want':'+ Want'}</button>
        <button class="pill ${inRead?'active':''}" data-action="read">${inRead?'✓ Read':'+ Read'}</button>
        <button class="pill fav ${inFav?'active':''}" data-action="fav">${inFav?'★':'☆'}</button>
        ${activeTab !== 'search' ? '<button class="pill remove" data-action="remove">Remove</button>' : ''}
      </div>
      ${activeTab === 'read' ? starsHTML(rating) : ''}
    </div>
  `;

  div.querySelectorAll('button[data-action]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const action = btn.dataset.action;
      const cover_i = b.cover_i || null;

      if (action === 'want' || action === 'read' || action === 'fav') {
        const res = await fetch(`/api/lists/${action}/toggle`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ key: k, title, author, cover_i })
        });
        const result = await res.json();
        if (result.active) {
          lists[action][k] = { title, author, cover_i, key: k };
        } else {
          delete lists[action][k];
        }
      } else if (action === 'remove') {
        await fetch(`/api/lists/${activeTab}/${encodeURIComponent(k)}`, { method: 'DELETE' });
        delete lists[activeTab][k];
      }
      updateCounts();
      renderActiveTab();
    });
  });

  if (activeTab === 'read') {
    div.querySelectorAll('.rating-star').forEach(star => {
      star.addEventListener('click', async () => {
        const val = parseInt(star.dataset.val);
        const current = lists.read[k] ? (lists.read[k].rating || 0) : 0;
        const newRating = (val === current) ? null : val;
        await fetch('/api/lists/rating', {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ listType: 'read', key: k, rating: newRating })
        });
        if (lists.read[k]) lists.read[k].rating = newRating;
        renderActiveTab();
      });
    });
  }

  return div;
}

function renderRecommendations(){
  const content = document.getElementById('content');
  content.innerHTML = '';
  if (!recommendations.length) {
    content.innerHTML = '<div class="empty">Recommendations failed to load.</div>';
    return;
  }

  const labelMap = {
    safest:     { text: 'Safest Bet',      cls: 'label-safest' },
    polarizing: { text: 'Polarizing',      cls: 'label-polarizing' },
    adjacent:   { text: 'Sci-fi Adjacent', cls: 'label-adjacent' },
    commitment: { text: 'Big Commitment',  cls: 'label-commitment' }
  };

  const container = document.createElement('div');
  container.className = 'recs-container';

  for (const section of recommendations) {
    const sect = document.createElement('div');
    sect.className = 'genre-section';

    const h = document.createElement('h2');
    h.className = 'genre-header';
    h.textContent = section.genre;
    sect.appendChild(h);

    const list = document.createElement('div');
    list.className = 'rec-list';

    for (const book of section.books) {
      const lm = labelMap[book.label] || {};
      const allKeys = [
        ...Object.keys(lists.want),
        ...Object.keys(lists.read),
        ...Object.keys(lists.fav)
      ];
      const inAnyList = allKeys.some(k => {
        const entry = lists.want[k] || lists.read[k] || lists.fav[k];
        return entry && entry.title === book.title;
      });

      const item = document.createElement('div');
      item.className = 'rec-item' + (inAnyList ? ' rec-item--saved' : '');
      item.innerHTML = `
        <div class="rec-info">
          <div class="rec-title">
            ${book.title}
            ${book.series ? `<span class="rec-series">${book.series}</span>` : ''}
            ${lm.text ? `<span class="label-badge ${lm.cls}">${lm.text}</span>` : ''}
            ${inAnyList ? '<span class="label-badge label-saved">On your shelf</span>' : ''}
          </div>
          <div class="rec-author">${book.author}</div>
          <div class="rec-blurb">${book.blurb}</div>
        </div>
        <div class="rec-actions">
          <button class="btn-find">Find this book →</button>
        </div>
      `;

      item.querySelector('.btn-find').addEventListener('click', () => {
        document.getElementById('searchInput').value = `${book.title} ${book.author}`;
        activeTab = 'search';
        setActiveTabUI('search');
        doSearch();
      });

      list.appendChild(item);
    }

    sect.appendChild(list);
    container.appendChild(sect);
  }

  content.appendChild(container);
}

async function doSearch(){
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  const content = document.getElementById('content');
  content.innerHTML = '<div class="loading">Searching the stacks…</div>';
  activeTab = 'search';
  setActiveTabUI('search');
  try {
    const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
    if (res.status === 401) { window.location.href = '/index.html'; return; }
    lastResults = await res.json();
    renderActiveTab();
  } catch (e) {
    content.innerHTML = '<div class="empty">Search failed. Check your connection and try again.</div>';
  }
}

function renderActiveTab(){
  if (activeTab === 'recs') { renderRecommendations(); return; }

  const content = document.getElementById('content');
  content.innerHTML = '';
  let items = [];

  if (activeTab === 'search') {
    items = lastResults.map(b => ({ book: b, key: bookKey(b) }));
    if (items.length === 0) {
      content.innerHTML = '<div class="empty">Search for a title or author above to get started.</div>';
      return;
    }
  } else {
    const stored = lists[activeTab];
    items = Object.keys(stored).map(k => ({ book: stored[k], key: k }));
    if (items.length === 0) {
      const labels = {
        want: "No books on your want-to-read list yet.",
        read: "No books marked as read yet.",
        fav:  "No favorites yet."
      };
      content.innerHTML = `<div class="empty">${labels[activeTab]}</div>`;
      return;
    }
  }

  const grid = document.createElement('div');
  grid.className = 'grid';
  items.forEach(({book, key}) => grid.appendChild(renderCard(book, key)));
  content.appendChild(grid);
}

function setActiveTabUI(tab){
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
}

document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    activeTab = t.dataset.tab;
    setActiveTabUI(activeTab);
    renderActiveTab();
  });
});

document.getElementById('searchBtn').addEventListener('click', doSearch);
document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

function createFallingPages(){
  const container = document.createElement('div');
  container.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden;';
  document.body.insertBefore(container, document.body.firstChild);

  for(let i = 0; i < 24; i++){
    const el  = document.createElement('div');
    const w   = Math.random()*13+7;
    const h   = w*(1.28+Math.random()*0.18);
    const x   = Math.random()*100;
    const dur = Math.random()*10+9;
    const del = Math.random()*18;
    const r0  = (Math.random()-0.5)*45;
    const r1  = r0+(Math.random()-0.5)*90;
    const op  = (Math.random()*0.10+0.04).toFixed(3);

    el.style.cssText = `
      position:absolute;left:${x}%;top:0;
      width:${w}px;height:${h}px;
      background:rgba(255,252,242,0.88);
      border:1px solid rgba(201,162,39,0.30);
      border-radius:1px;
      box-shadow:0 1px 3px rgba(31,61,46,0.08);
      animation:page-fall ${dur}s ${del}s linear infinite;
    `;
    el.style.setProperty('--r0', r0+'deg');
    el.style.setProperty('--r1', r1+'deg');
    el.style.setProperty('--op', op);
    container.appendChild(el);
  }
}

(async () => {
  createFallingPages();
  await checkAuth();
  await Promise.all([loadLists(), loadRecommendations()]);
  renderActiveTab();
})();
</script>
</body>
</html>
