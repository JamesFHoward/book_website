<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bookshelf</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div>
      <h1>Bookshelf</h1>
      <p class="tagline">Search, favorite, and track what you've read — and what's next.</p>
    </div>
    <div class="userchip" id="userchip"></div>
  </div>

  <div class="searchbar">
    <input type="text" id="searchInput" placeholder="Search by title or author…" autocomplete="off">
    <button class="btn-primary" id="searchBtn" style="width:auto;">Search</button>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="search">Search</button>
    <button class="tab" data-tab="want">Want to Read<span class="count" id="countWant">0</span></button>
    <button class="tab" data-tab="read">Already Read<span class="count" id="countRead">0</span></button>
    <button class="tab" data-tab="fav">Favorites<span class="count" id="countFav">0</span></button>
    <button class="tab" data-tab="recs">Recommendations</button>
  </div>

  <div id="content"></div>
</div>

<script src="/background.js"></script>
<script>
let lists = { want: {}, read: {}, fav: {} };
let lastResults = [];
let recommendations = [];
let activeTab = 'search';

async function checkAuth(){
  const res = await fetch('/api/me');
  const data = await res.json();
  if (!data.loggedIn) { window.location.href = '/index.html'; return; }
  document.getElementById('userchip').innerHTML =
    `Signed in as <strong>${data.username}</strong><br><button id="logoutBtn">Sign out</button>`;
  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await fetch('/api/logout', { method: 'POST' });
    window.location.href = '/index.html';
  });
}

async function loadLists(){
  const res = await fetch('/api/lists');
  if (res.status === 401) { window.location.href = '/index.html'; return; }
  lists = await res.json();
  updateCounts();
}

async function loadRecommendations(){
  try {
    const res = await fetch('/recommendations.json');
    recommendations = await res.json();
  } catch (_) {
    recommendations = [];
  }
}

function updateCounts(){
  document.getElementById('countWant').textContent = Object.keys(lists.want).length;
  document.getElementById('countRead').textContent = Object.keys(lists.read).length;
  document.getElementById('countFav').textContent = Object.keys(lists.fav).length;
}

function bookKey(b){ return b.key || (b.title + '::' + (b.author_name ? b.author_name[0] : '')); }

function coverUrl(b){
  if (b.cover_i) return `https://covers.openlibrary.org/b/id/${b.cover_i}-M.jpg`;
  return null;
}

function starsHTML(current){
  let html = '<div class="rating-row">';
  for (let i = 1; i <= 5; i++){
    html += `<span class="rating-star${i <= current ? ' filled' : ''}" data-val="${i}" title="${i} star${i>1?'s':''}">★</span>`;
  }
  html += '</div>';
  return html;
}

function renderCard(b, idKey){
  const k = idKey;
  const cover = coverUrl(b);
  const inWant = !!lists.want[k];
  const inRead = !!lists.read[k];
  const inFav  = !!lists.fav[k];
  const author = b.author_name ? b.author_name.join(', ') : (b.author || 'Unknown author');
  const title  = b.title || '(untitled)';
  const rating = (activeTab === 'read' && lists.read[k]) ? (lists.read[k].rating || 0) : 0;

  const div = document.createElement('div');
  div.className = 'card';
  div.innerHTML = `
    ${inFav ? '<span class="star">⭐</span>' : ''}
    <div class="cover">${cover ? `<img src="${cover}" alt="Cover of ${title}">` : `<span class="cover-fallback">${title[0]}</span>`}</div>
    <div class="info">
      <div class="title">${title}</div>
      <div class="author">${author}</div>
      <div class="actions">
        <button class="pill ${inWant?'active':''}" data-action="want">${inWant?'✓ Want':'+ Want'}</button>
        <button class="pill ${inRead?'active':''}" data-action="read">${inRead?'✓ Read':'+ Read'}</button>
        <button class="pill fav ${inFav?'active':''}" data-action="fav">${inFav?'★':'☆'}</button>
        ${activeTab !== 'search' ? '<button class="pill remove" data-action="remove">Remove</button>' : ''}
      </div>
      ${activeTab === 'read' ? starsHTML(rating) : ''}
    </div>
  `;

  div.querySelectorAll('button[data-action]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const action = btn.dataset.action;
      const cover_i = b.cover_i || null;

      if (action === 'want' || action === 'read' || action === 'fav') {
        const res = await fetch(`/api/lists/${action}/toggle`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ key: k, title, author, cover_i })
        });
        const result = await res.json();
        if (result.active) {
          lists[action][k] = { title, author, cover_i, key: k };
        } else {
          delete lists[action][k];
        }
      } else if (action === 'remove') {
        await fetch(`/api/lists/${activeTab}/${encodeURIComponent(k)}`, { method: 'DELETE' });
        delete lists[activeTab][k];
      }
      updateCounts();
      renderActiveTab();
    });
  });

  if (activeTab === 'read') {
    div.querySelectorAll('.rating-star').forEach(star => {
      star.addEventListener('click', async () => {
        const val = parseInt(star.dataset.val);
        const current = lists.read[k] ? (lists.read[k].rating || 0) : 0;
        const newRating = (val === current) ? null : val;
        await fetch('/api/lists/rating', {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ listType: 'read', key: k, rating: newRating })
        });
        if (lists.read[k]) lists.read[k].rating = newRating;
        renderActiveTab();
      });
    });
  }

  return div;
}

function renderRecommendations(){
  const content = document.getElementById('content');
  content.innerHTML = '';
  if (!recommendations.length) {
    content.innerHTML = '<div class="empty">Recommendations failed to load.</div>';
    return;
  }

  const labelMap = {
    safest:     { text: 'Safest Bet',      cls: 'label-safest' },
    polarizing: { text: 'Polarizing',      cls: 'label-polarizing' },
    adjacent:   { text: 'Sci-fi Adjacent', cls: 'label-adjacent' },
    commitment: { text: 'Big Commitment',  cls: 'label-commitment' }
  };

  const container = document.createElement('div');
  container.className = 'recs-container';

  for (const section of recommendations) {
    const sect = document.createElement('div');
    sect.className = 'genre-section';

    const h = document.createElement('h2');
    h.className = 'genre-header';
    h.textContent = section.genre;
    sect.appendChild(h);

    const list = document.createElement('div');
    list.className = 'rec-list';

    for (const book of section.books) {
      const lm = labelMap[book.label] || {};
      const allKeys = [
        ...Object.keys(lists.want),
        ...Object.keys(lists.read),
        ...Object.keys(lists.fav)
      ];
      const inAnyList = allKeys.some(k => {
        const entry = lists.want[k] || lists.read[k] || lists.fav[k];
        return entry && entry.title === book.title;
      });

      const item = document.createElement('div');
      item.className = 'rec-item' + (inAnyList ? ' rec-item--saved' : '');
      item.innerHTML = `
        <div class="rec-info">
          <div class="rec-title">
            ${book.title}
            ${book.series ? `<span class="rec-series">${book.series}</span>` : ''}
            ${lm.text ? `<span class="label-badge ${lm.cls}">${lm.text}</span>` : ''}
            ${inAnyList ? '<span class="label-badge label-saved">On your shelf</span>' : ''}
          </div>
          <div class="rec-author">${book.author}</div>
          <div class="rec-blurb">${book.blurb}</div>
        </div>
        <div class="rec-actions">
          <button class="btn-find">Find this book →</button>
        </div>
      `;

      item.querySelector('.btn-find').addEventListener('click', () => {
        document.getElementById('searchInput').value = `${book.title} ${book.author}`;
        activeTab = 'search';
        setActiveTabUI('search');
        doSearch();
      });

      list.appendChild(item);
    }

    sect.appendChild(list);
    container.appendChild(sect);
  }

  content.appendChild(container);
}

async function doSearch(){
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  const content = document.getElementById('content');
  content.innerHTML = '<div class="loading">Searching the stacks…</div>';
  activeTab = 'search';
  setActiveTabUI('search');
  try {
    const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
    if (res.status === 401) { window.location.href = '/index.html'; return; }
    lastResults = await res.json();
    renderActiveTab();
  } catch (e) {
    content.innerHTML = '<div class="empty">Search failed. Check your connection and try again.</div>';
  }
}

function renderActiveTab(){
  if (activeTab === 'recs') { renderRecommendations(); return; }

  const content = document.getElementById('content');
  content.innerHTML = '';
  let items = [];

  if (activeTab === 'search') {
    items = lastResults.map(b => ({ book: b, key: bookKey(b) }));
    if (items.length === 0) {
      content.innerHTML = '<div class="empty">Search for a title or author above to get started.</div>';
      return;
    }
  } else {
    const stored = lists[activeTab];
    items = Object.keys(stored).map(k => ({ book: stored[k], key: k }));
    if (items.length === 0) {
      const labels = {
        want: "No books on your want-to-read list yet.",
        read: "No books marked as read yet.",
        fav:  "No favorites yet."
      };
      content.innerHTML = `<div class="empty">${labels[activeTab]}</div>`;
      return;
    }
  }

  const grid = document.createElement('div');
  grid.className = 'grid';
  items.forEach(({book, key}) => grid.appendChild(renderCard(book, key)));
  content.appendChild(grid);
}

function setActiveTabUI(tab){
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
}

document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    activeTab = t.dataset.tab;
    setActiveTabUI(activeTab);
    renderActiveTab();
  });
});

document.getElementById('searchBtn').addEventListener('click', doSearch);
document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

const PAGE_WORDS = [
  // Books actually read
  'Silent Patient','Spirit Bear','Bloody Rose',"Can't Hurt Me",
  'Kings of the Wyld','The Only One Left',
  // Characters & names from those books
  'Alicia','Gabriel','Cole','Edwin','Goggins','Clay','Rose','Wren','Lena',
  // Themes from those books
  'Silence','Confess','Heal','Callous','Limits','Legend','Keeper',
  'Bear','Saga','Endure','Island','Trial','Mercy',
  // Classic page markers
  'Ch. I','Ch. II','Ch. III','Prologue','Epilogue','Part I','Part II',
  // Page refs
  'p. 1','p. 42','p. 99','p. 314',
  // Drop-cap initials (first letters of each book title)
  'S','B','C','K','T','A','G','D','W','R',
];

function createFallingPages(){
  for(let i = 0; i < 25; i++){
    const el  = document.createElement('div');
    const w   = Math.random()*26+22;
    const h   = w*(1.3+Math.random()*0.2);
    const x   = Math.random()*48;
    const dur = (Math.random()*12+18) * 1000;  // 18–30s — slow, drifting float
    const del = -(Math.random()*dur);
    const r0  = (Math.random()-0.5)*40;
    const r1  = r0+(Math.random()-0.5)*80;
    const lineGap = Math.floor(h * 0.22);

    // Two overlapping sine waves = irregular gusts rather than mechanical pendulum
    const amp1   = Math.random()*50+35;
    const amp2   = amp1*(Math.random()*0.3+0.15);   // secondary gust: 15–45% of main
    const ph1    = Math.random()*Math.PI*2;
    const ph2    = Math.random()*Math.PI*2;
    const c1     = Math.random()*0.8+1.0;            // 1.0–1.8 main cycles
    const c2     = Math.random()*1.2+2.2;            // 2.2–3.4 faster secondary cycles

    // s*|s| instead of plain sin: hits peak and recovers 2× faster so the
    // pause at each direction change is far shorter while motion stays smooth
    const s1 = t => Math.sin(ph1 + t*Math.PI*2*c1);
    const s2 = t => Math.sin(ph2 + t*Math.PI*2*c2);
    // s³ (odd power, preserves sign): 3× faster recovery at turning points
    const drift = t => amp1*Math.pow(s1(t),3) + amp2*Math.pow(s2(t),3);

    // Derivative of s³ = 3s²·s′
    const driftVel = t => {
      const v = amp1*3*s1(t)*s1(t)*Math.cos(ph1+t*Math.PI*2*c1)*Math.PI*2*c1
              + amp2*3*s2(t)*s2(t)*Math.cos(ph2+t*Math.PI*2*c2)*Math.PI*2*c2;
      const maxV = amp1*3*Math.PI*2*c1 + amp2*3*Math.PI*2*c2;
      return v / maxV;
    };

    const rotAt = t => r0+(r1-r0)*t + driftVel(t)*15;  // tilt into direction of motion
    const rxAt  = t => Math.sin(t*Math.PI*5+ph1)*10;   // page flex
    const ryAt  = t => driftVel(t)*7;                  // face into wind
    const tf    = (t, ty) =>
      `perspective(500px) translateY(${ty}) translateX(${drift(t).toFixed(1)}px) rotateZ(${rotAt(t).toFixed(1)}deg) rotateX(${rxAt(t).toFixed(1)}deg) rotateY(${ryAt(t).toFixed(1)}deg)`;

    el.style.cssText = `
      position:fixed;left:${x}%;top:0;
      width:${w}px;height:${h}px;
      background:rgba(242,236,221,0.82);
      background-image:
        linear-gradient(90deg,rgba(0,0,0,0.04) 0%,transparent 20%,transparent 80%,rgba(0,0,0,0.04) 100%),
        repeating-linear-gradient(transparent,transparent 4px,rgba(31,61,46,0.12) 4px,rgba(31,61,46,0.12) 5px);
      background-position:0 0,0 ${lineGap}px;
      border:1.5px solid rgba(31,61,46,0.38);
      border-radius:1px 3px 2px 1px;
      box-shadow:0 3px 10px rgba(31,61,46,0.22);
      pointer-events:none;z-index:0;overflow:hidden;
    `;

    // Dog-eared corner on ~40% of pages
    if (Math.random() > 0.6) {
      const corner = document.createElement('div');
      const cs = Math.floor(Math.min(w, h) * 0.28);
      corner.style.cssText = `
        position:absolute;bottom:0;right:0;
        width:${cs}px;height:${cs}px;
        background:rgba(31,61,46,0.13);
        clip-path:polygon(100% 0,100% 100%,0 100%);
      `;
      el.appendChild(corner);
    }

    // Text on ~65% of pages
    if (Math.random() > 0.35) {
      const txt = document.createElement('div');
      const word = PAGE_WORDS[Math.floor(Math.random()*PAGE_WORDS.length)];
      const fs   = Math.max(6, Math.floor(w * 0.20));
      txt.style.cssText = `
        font-family:'Fraunces',serif;
        font-size:${fs}px;
        color:rgba(31,61,46,0.55);
        text-align:center;
        padding:${Math.floor(h*0.08)}px 2px 0;
        line-height:1.2;overflow:hidden;white-space:nowrap;
      `;
      txt.textContent = word;
      el.appendChild(txt);
    }

    document.body.appendChild(el);

    // 12 evenly-spaced stops so the browser samples the velocity curve finely;
    // per-keyframe ease-in-out so each segment decelerates into the next naturally
    const N = 12;
    const kf = Array.from({length: N+1}, (_, k) => {
      const t  = k / N;
      const ty = t === 0 ? `-${(h+40).toFixed(0)}px`
               : t === 1 ? '110vh'
               : `${(t*112 - 1).toFixed(1)}vh`;
      return {
        offset:  t,
        opacity: t < 0.001 ? 0 : t > 0.999 ? 0 : t < 0.09 ? t/0.09*0.7 : t > 0.91 ? (1-t)/0.09*0.7 : 0.7,
        transform: tf(t, ty),
        easing: 'linear'
      };
    });
    el.animate(kf, { duration:dur, delay:del, iterations:Infinity, easing:'linear', fill:'both' });
  }
}

(async () => {
  createFallingPages();
  await checkAuth();
  await Promise.all([loadLists(), loadRecommendations()]);
  renderActiveTab();
})();
</script>
</body>
</html>
