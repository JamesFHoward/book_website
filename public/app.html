<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="/style.css">

<body>

  <div class="topbar">

<!-- background loaded dynamically below via ?bg= param -->
<div id="toastEl" class="toast"></div>
<script>
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});
let lists = { want: {}, read: {}, fav: {} };
let lastResults = [];
let recommendations = [];
let activeTab = 'recs';
let readingList = [];   // currently reading books
let readingGoal = null; // { year, goal, read } for current year
let dnfList = [];       // did not finish books
let collections = [];   // user collections
let activeSort = 'date'; // sort state for shelf tabs
let finishRecsPanel = null; // "Because you finished" panel reference

let _undoTimer = null;
function showToast(msg, onUndo) {
  const el = document.getElementById('toastEl');
  if (_undoTimer) clearTimeout(_undoTimer);
  el.innerHTML = `<span>${msg}</span>${onUndo ? '<button class="toast-undo">Undo</button>' : ''}`;
  el.classList.add('toast-show');
  if (onUndo) el.querySelector('.toast-undo').addEventListener('click', () => { clearTimeout(_undoTimer); onUndo(); hideToast(); });
  _undoTimer = setTimeout(hideToast, 5000);
}
function hideToast() { document.getElementById('toastEl').classList.remove('toast-show'); }

// Cover lookup cache
const coverLookupCache = new Map();
async function lookupCover(book) {
  const key = (book.title || '').toLowerCase().trim();
  if (coverLookupCache.has(key)) return coverLookupCache.get(key);
  if (book.cover_i || book.cover_isbn) {
    const r = { cover_i: book.cover_i || null, cover_isbn: book.cover_isbn || null };
    coverLookupCache.set(key, r);
    return r;
  }
  try {
    const params = new URLSearchParams({ title: book.title });
    if (book.author) params.set('author', book.author);
    const res = await fetch(`/api/covers/lookup?${params}`);
    const data = await res.json();
    coverLookupCache.set(key, data);
    return data;
  } catch {
    const fallback = { cover_i: null, cover_isbn: null };
    coverLookupCache.set(key, fallback);
    return fallback;
  }
}

async function checkAuth(){
  const res = await fetch('/api/me');
  const data = await res.json();
  if (!data.loggedIn) { window.location.href = '/index.html'; return; }
  // Dark mode init
  const darkPref = localStorage.getItem('darkMode') === 'true';
  if (darkPref) document.documentElement.classList.add('dark');
  document.getElementById('userchip').innerHTML =
    `<div class="userchip-actions">
       <button id="darkToggle" class="nav-btn nav-btn-back" style="font-size:13px;padding:7px 12px;">${darkPref ? '☀ Light' : '🌙 Dark'}</button>
       <a href="/profile.html" class="nav-btn nav-btn-profile" title="View your profile"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>${escHtml(data.username)}</a>
       <button id="logoutBtn" class="nav-btn nav-btn-signout">Sign out</button>
     </div>`;
  const logoutBtn = document.getElementById('logoutBtn');
  if (logoutBtn) {
    logoutBtn.addEventListener('click', async () => {
      logoutBtn.disabled = true;
      logoutBtn.textContent = 'Signing out…';
      try { await fetch('/api/logout', { method: 'POST' }); } catch (_) {}
      window.location.replace('/index.html');
    });
  }
  document.getElementById('darkToggle').addEventListener('click', () => {
    const isDark = document.documentElement.classList.toggle('dark');
    localStorage.setItem('darkMode', isDark);
    document.getElementById('darkToggle').textContent = isDark ? '☀ Light' : '🌙 Dark';
  });
}

async function loadLists(){
  const res = await fetch('/api/lists');
  if (res.status === 401) { window.location.href = '/index.html'; return; }
  lists = await res.json();
  updateCounts();
}

async function loadRecommendations(){
  try {
    const res = await fetch('/recommendations.json');
    recommendations = await res.json();
  } catch (_) {
    recommendations = [];
  }
}

async function prefetchMissingCovers(){
  let needsRerender = false;
  const lookups = [];
  for (const section of recommendations){
    for (const book of section.books){
      if (!book.cover_i && !book.cover_isbn){
        lookups.push(
          lookupCover(book).then(result => {
            if (result.cover_i || result.cover_isbn){
              book.cover_i = result.cover_i;
              book.cover_isbn = result.cover_isbn;
              needsRerender = true;
            }
          })
        );
      }
    }
  }
  if (!lookups.length) return;
  await Promise.all(lookups);
  if (needsRerender && activeTab === 'recs') renderRecommendations();
}

async function loadReading(){
  try {
    const [rRes, gRes] = await Promise.all([
      fetch('/api/reading'),
      fetch(`/api/goals/${new Date().getFullYear()}`),
    ]);
    readingList = rRes.ok ? await rRes.json() : [];
    readingGoal = gRes.ok ? await gRes.json() : null;
  } catch (_) {
    readingList = [];
  }
}

async function loadDnf() {
  try {
    const r = await fetch('/api/dnf');
    dnfList = r.ok ? await r.json() : [];
  } catch (_) { dnfList = []; }
}

function updateCounts(){
  const n = v => v || '';
  document.getElementById('countWant').textContent    = n(Object.keys(lists.want).length);
  document.getElementById('countRead').textContent    = n(Object.keys(lists.read).length);
  document.getElementById('countFav').textContent     = n(Object.keys(lists.fav).length);
  document.getElementById('countReading').textContent = n(readingList.length);
  const dnfEl = document.getElementById('countDnf');
  if (dnfEl) dnfEl.textContent = n(dnfList.length);
}

// bookKey, coverUrl, escHtml, calcPace loaded from /utils.js

function starsHTML(current){
  let html = '<div class="rating-row">';
  for (let i = 1; i <= 5; i++){
    html += `<span class="rating-star${i <= current ? ' filled' : ''}" data-val="${i}" title="${i} star${i>1?'s':''}">★</span>`;
  }
  html += '</div>';
  return html;
}

function favStarsHTML(rating){
  let html = '<div class="rating-row" style="margin-top:5px;">';
  for (let i = 1; i <= 5; i++){
    html += `<span class="rating-star${i <= rating ? ' filled' : ''}" style="font-size:14px;cursor:default;">★</span>`;
  }
  html += '</div>';
  return html;
}


function renderCard(b, idKey){
  const k = idKey;
  const cover = coverUrl(b);
  const inWant    = !!lists.want[k];
  const inRead    = !!lists.read[k];
  const inFav     = !!lists.fav[k];
  const inReading = readingList.some(r => r.key === k);
  const author = b.author_name ? b.author_name.join(', ') : (b.author || 'Unknown author');
  const title  = b.title || '(untitled)';
  const rating = (activeTab === 'read' || activeTab === 'fav') ? (lists.read[k]?.rating || 0) : 0;
  const note   = (activeTab !== 'search' && lists[activeTab]?.[k]?.note) || '';

  const div = document.createElement('div');
  div.className = 'card';
  div.innerHTML = `
    ${inFav ? '<span class="star">⭐</span>' : ''}
    <div class="cover">
      ${cover ? `<img src="${cover}" alt="Cover of ${escHtml(title)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">` : ''}
      <span class="cover-fallback"${cover ? ' style="display:none"' : ''}>${escHtml((title||'?')[0])}</span>
    </div>
    <div class="info">
      <div class="title">${escHtml(title)}</div>
      <div class="author"><span class="author-link" data-author="${escHtml(author)}">${escHtml(author)}</span></div>
      <div class="actions">
        <button class="pill ${inWant?'active':''}" data-action="want">${inWant?'✓ Want':'+ Want'}</button>
        <button class="pill ${inRead?'active':''}" data-action="read">${inRead?'✓ Read':'+ Read'}</button>
        <button class="pill ${inReading?'active':''}" data-action="reading">${inReading?'📖 Reading':'+ Reading'}</button>
        <button class="pill fav ${inFav?'active':''}" data-action="fav">${inFav?'★':'☆'}</button>
        ${activeTab !== 'search' ? '<button class="pill remove" data-action="remove">Remove</button>' : ''}
      </div>
      ${activeTab === 'read' ? starsHTML(rating) : ''}
      ${activeTab === 'fav' && rating > 0 ? favStarsHTML(rating) : ''}
      ${activeTab !== 'search' ? `
        <div class="note-area${activeTab === 'read' ? ' note-area--review' : ''}">
          <div class="note-display${activeTab === 'read' ? ' note-display--review' : ''}" style="display:${note?'block':'none'}"></div>
          <button class="note-toggle">${
            note
              ? (activeTab === 'read' ? '✏ Edit review' : '✏ Edit note')
              : (activeTab === 'read' ? '✏ Write a review' : '✏ Add note')
          }</button>
          <div class="note-editor" style="display:none">
            <textarea class="note-ta" placeholder="${activeTab === 'read' ? 'What did you think? Share your review…' : 'Your thoughts on this book…'}"></textarea>
            <div class="note-btns">
              <button class="note-save">Save</button>
              <button class="note-cancel">Cancel</button>
            </div>
          </div>
        </div>` : ''}
    </div>
  `;

  // Set note text safely via textContent / value (not innerHTML)
  if (activeTab !== 'search') {
    div.querySelector('.note-display').textContent = note;
    div.querySelector('.note-ta').value = note;
  }

  div.querySelectorAll('button[data-action]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const action = btn.dataset.action;
      const cover_i = b.cover_i || null;

      if (action === 'want' || action === 'read' || action === 'fav') {
        const res = await fetch(`/api/lists/${action}/toggle`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ key: k, title, author, cover_i })
        });
        const result = await res.json();
        if (result.active) {
          lists[action][k] = { title, author, cover_i, key: k };
          // Clear conflicting lists from local state
          for (const gone of (result.removed || [])) {
            if (gone === 'want' || gone === 'read') delete lists[gone][k];
            if (gone === 'reading') readingList = readingList.filter(r => r.key !== k);
          }
          // Adding to any shelf clears DNF
          dnfList = dnfList.filter(d => d.key !== k);
        } else {
          delete lists[action][k];
        }
      } else if (action === 'reading') {
        if (inReading) {
          await fetch(`/api/reading/${encodeURIComponent(k)}`, { method: 'DELETE' });
          readingList = readingList.filter(r => r.key !== k);
        } else {
          await fetch('/api/reading/add', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ key: k, title, author, cover_i, cover_isbn: b.cover_isbn || null, total_pages: b.number_of_pages_median || null }),
          });
          readingList.push({ key: k, title, author, cover_i, cover_isbn: b.cover_isbn || null, current_page: 0, total_pages: b.number_of_pages_median || null });
          // Adding to reading clears want and DNF
          delete lists.want[k];
          dnfList = dnfList.filter(d => d.key !== k);
        }
      } else if (action === 'remove') {
        const savedBook = { ...lists[activeTab][k] };
        const savedTab = activeTab;
        await fetch(`/api/lists/${activeTab}/${encodeURIComponent(k)}`, { method: 'DELETE' });
        delete lists[activeTab][k];
        updateCounts(); renderActiveTab();
        showToast(`Removed "${title}"`, async () => {
          const rv = await fetch(`/api/lists/${savedTab}/toggle`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ key: k, title, author, cover_i }) });
          if ((await rv.json()).ok) { lists[savedTab][k] = savedBook; updateCounts(); if (activeTab === savedTab) renderActiveTab(); }
        });
        return;
      }
      updateCounts();
      renderActiveTab();
    });
  });

  if (activeTab === 'read') {
    div.querySelectorAll('.rating-star').forEach(star => {
      star.addEventListener('click', async () => {
        const val = parseInt(star.dataset.val);
        const current = lists.read[k] ? (lists.read[k].rating || 0) : 0;
        const newRating = (val === current) ? null : val;
        await fetch('/api/lists/rating', {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ listType: 'read', key: k, rating: newRating })
        });
        if (lists.read[k]) lists.read[k].rating = newRating;
        renderActiveTab();
      });
    });
  }

  // ── Note interactions ──
  if (activeTab !== 'search') {
    const noteToggle  = div.querySelector('.note-toggle');
    const noteEditor  = div.querySelector('.note-editor');
    const noteDisplay = div.querySelector('.note-display');
    const noteTa      = div.querySelector('.note-ta');
    const noteSave    = div.querySelector('.note-save');
    const noteCancel  = div.querySelector('.note-cancel');

    noteToggle.addEventListener('click', () => {
      noteEditor.style.display = 'block';
      noteToggle.style.display = 'none';
      noteTa.focus();
      noteTa.selectionStart = noteTa.selectionEnd = noteTa.value.length;
    });

    noteCancel.addEventListener('click', () => {
      noteTa.value = lists[activeTab]?.[k]?.note || '';
      noteEditor.style.display = 'none';
      noteToggle.style.display = '';
    });

    noteSave.addEventListener('click', async () => {
      const newNote = noteTa.value.trim();
      noteSave.disabled = true;
      noteSave.textContent = 'Saving…';
      await fetch('/api/lists/note', {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ listType: activeTab, key: k, note: newNote }),
      });
      if (lists[activeTab]?.[k]) lists[activeTab][k].note = newNote || null;
      noteDisplay.textContent = newNote;
      noteDisplay.style.display = newNote ? 'block' : 'none';
      noteToggle.textContent = newNote
        ? (activeTab === 'read' ? '✏ Edit review' : '✏ Edit note')
        : (activeTab === 'read' ? '✏ Write a review' : '✏ Add note');
      noteEditor.style.display = 'none';
      noteToggle.style.display = '';
      noteSave.disabled = false;
      noteSave.textContent = 'Save';
    });
  }

  // Click on card body (not buttons) opens detail modal
  div.addEventListener('click', e => {
    if (e.target.closest('button')) return;
    if (activeTab === 'search') {
      showSearchModal(b);
    } else {
      showBookModal({
        title: b.title,
        author: b.author || '',
        cover_i: b.cover_i || null,
        cover_isbn: null,
        blurb: null,
        olBook: { key: b.key, title: b.title, author_name: b.author ? [b.author] : [], cover_i: b.cover_i || null },
        accentColor: '#1F3D2E',
        pages: null,
      });
    }
  });
  div.style.cursor = 'pointer';

  const authorLink = div.querySelector('.author-link');
  if (authorLink) {
    authorLink.addEventListener('click', e => {
      e.stopPropagation();
      const a = authorLink.dataset.author;
      document.getElementById('searchInput').value = 'author:' + a;
      document.querySelector('[data-tab="search"]').click();
      document.getElementById('searchBtn').click();
    });
  }

  return div;
}

const GENRE_COLORS = {
  'Fantasy':             '#1B3A27',
  'Science Fiction':     '#1A2B4A',
  'Thriller & Suspense': '#5C1A1A',
  'Mystery':             '#3D1A5C',
  'Horror':              '#2A0A0A',
  'Historical Fiction':  '#4A3010',
  'Biography & Memoir':  '#1A3A4A',
  'True Crime':          '#3A1A00',
  'Personal Development':'#1A4040',
  'Literary Fiction':    '#2A2A40',
};
const REC_MOOD_LABELS = {
  'fast':'Fast Reads','dark':'Dark & Gritty','epic':'Epic Scale','cosy':'Cosy',
  'literary':'Literary','true-story':'True Stories','mind-bending':'Mind-Bending',
  'classic':'Classics','short':'Short Reads','action':'Action-Packed',
  'horror':'Horror','emotional':'Emotional',
};
const MOOD_ORDER = ['fast','dark','epic','cosy','literary','true-story','mind-bending','classic','short','action','horror','emotional'];

function recShelfTitles(){
  return new Set([
    ...Object.values(lists.want),
    ...Object.values(lists.read),
    ...Object.values(lists.fav),
  ].map(b => (b.title || '').toLowerCase().trim()));
}

function computeGenreAffinity() {
  // Weighted: fav=3, read=2, want=1
  const titleScore = new Map();
  [['fav',3],['read',2],['want',1]].forEach(([list, w]) => {
    for (const b of Object.values(lists[list])) {
      const t = (b.title||'').toLowerCase().trim();
      titleScore.set(t, (titleScore.get(t) || 0) + w);
    }
  });
  const affinity = {};
  for (const section of recommendations) {
    let score = 0;
    for (const book of section.books)
      score += titleScore.get((book.title||'').toLowerCase().trim()) || 0;
    affinity[section.genre] = score;
  }
  return affinity;
}

function forYouPicks(affinity, shelfTitles) {
  const totalAffinity = Object.values(affinity).reduce((a,b) => a+b, 0);
  if (!totalAffinity) return [];
  const picks = [];
  for (const section of recommendations) {
    const score = affinity[section.genre] || 0;
    if (!score) continue;
    const color = GENRE_COLORS[section.genre] || '#1F3D2E';
    for (const book of section.books) {
      if (!book.cover_i && !book.cover_isbn) continue;
      if (shelfTitles.has((book.title||'').toLowerCase().trim())) continue;
      picks.push({ book, genre: section.genre, color, score });
    }
  }
  picks.sort((a, b) => b.score - a.score);
  return picks.slice(0, 20);
}

function renderRecommendations(){
  const content = document.getElementById('content');
  content.innerHTML = '';
  if (!recommendations.length){
    content.innerHTML = '<div class="empty">Recommendations failed to load.</div>';
    return;
  }

  const affinity    = computeGenreAffinity();
  const shelfTitles = recShelfTitles();
  const picks       = forYouPicks(affinity, shelfTitles);

  function onShelf(b){ return shelfTitles.has((b.title||'').toLowerCase().trim()); }

  const scored = recommendations.map(s => ({
    ...s,
    _score: affinity[s.genre] || 0,
    _count: s.books.filter(b => shelfTitles.has((b.title||'').toLowerCase().trim())).length,
  })).sort((a,b) => b._score - a._score);

  let activeGenre = 'all';
  const wrap = document.createElement('div');

  // ── Book of the Week ──
  const botwContainer = document.createElement('div');
  botwContainer.className = 'botw-container';
  wrap.appendChild(botwContainer);
  fetch('/api/discover/book-of-week')
    .then(r => r.json())
    .then(botw => {
      if (!botwContainer.isConnected) return;
      const olid = (botw.key || '').replace('/works/', '');
      const botwCoverUrl = botw.cover_i
        ? `https://covers.openlibrary.org/b/id/${botw.cover_i}-L.jpg`
        : `https://covers.openlibrary.org/b/olid/${olid}-L.jpg`;
      const inWant = !!(botw.key && lists.want[botw.key]);
      botwContainer.innerHTML = `
        <div class="botw-card">
          <div class="botw-badge">✦ Book of the Week</div>
          <div class="botw-inner">
            <div class="botw-cover">
              <img src="${botwCoverUrl}" alt="${escHtml(botw.title)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
              <span class="botw-cover-initial" style="display:none">${escHtml((botw.title||'?')[0])}</span>
            </div>
            <div class="botw-info">
              <div class="botw-title">${escHtml(botw.title)}</div>
              <div class="botw-author">by ${escHtml(botw.author)}</div>
              ${botw.blurb ? `<div class="botw-blurb">${escHtml(botw.blurb)}</div>` : ''}
              <button class="botw-want-btn${inWant ? ' active' : ''}">${inWant ? '✓ Want to Read' : '+ Want to Read'}</button>
            </div>
          </div>
        </div>
      `;
      const wantBtn = botwContainer.querySelector('.botw-want-btn');
      wantBtn.addEventListener('click', async e => {
        e.stopPropagation();
        const res = await fetch('/api/lists/want/toggle', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ key: botw.key, title: botw.title, author: botw.author, cover_i: botw.cover_i || null }),
        });
        const r = await res.json();
        if (r.active) {
          lists.want[botw.key] = { title: botw.title, author: botw.author, cover_i: botw.cover_i || null, key: botw.key };
          for (const gone of (r.removed || [])) {
            if (gone === 'read') delete lists.read[botw.key];
            if (gone === 'reading') readingList = readingList.filter(e => e.key !== botw.key);
          }
          dnfList = dnfList.filter(d => d.key !== botw.key);
        } else {
          delete lists.want[botw.key];
        }
        updateCounts();
        wantBtn.textContent = lists.want[botw.key] ? '✓ Want to Read' : '+ Want to Read';
        wantBtn.classList.toggle('active', !!lists.want[botw.key]);
      });
      botwContainer.querySelector('.botw-inner').addEventListener('click', e => {
        if (e.target.closest('button')) return;
        showBookModal({ title: botw.title, author: botw.author, cover_i: botw.cover_i || null, cover_isbn: null, blurb: botw.blurb || null, accentColor: '#1F3D2E' });
      });
      botwContainer.querySelector('.botw-inner').style.cursor = 'pointer';
    })
    .catch(() => { botwContainer.innerHTML = ''; });

  // Genre filter bar
  const genreBar = document.createElement('div');
  genreBar.className = 'mood-bar';
  [{ key: 'all', label: 'All' }, ...scored.map(s => ({ key: s.genre, label: s.genre }))].forEach(({ key, label }) => {
    const chip = document.createElement('button');
    chip.className = 'mood-chip' + (key === 'all' ? ' active' : '');
    chip.textContent = label;
    chip.dataset.genre = key;
    if (key !== 'all') chip.dataset.color = GENRE_COLORS[key] || '#1F3D2E';
    genreBar.appendChild(chip);
  });
  genreBar.addEventListener('click', e => {
    const chip = e.target.closest('.mood-chip'); if (!chip) return;
    activeGenre = chip.dataset.genre;
    genreBar.querySelectorAll('.mood-chip').forEach(c => {
      const active = c === chip;
      c.classList.toggle('active', active);
      if (active && c.dataset.color) {
        c.style.background = c.dataset.color;
        c.style.borderColor = c.dataset.color;
        c.style.color = '#fff';
      } else {
        c.style.background = '';
        c.style.borderColor = '';
        c.style.color = '';
      }
    });
    renderSections();
  });
  wrap.appendChild(genreBar);

  const sectionsWrap = document.createElement('div');
  wrap.appendChild(sectionsWrap);
  content.appendChild(wrap);

  // Titles shown in "For You" — excluded from genre sections to avoid repeats
  const forYouTitles = new Set(picks.map(p => (p.book.title||'').toLowerCase().trim()));

  // Client-side cache for OL genre fetch results
  const olGenreCache = new Map();

  async function fetchOlGenreBooks(olQuery, excludeTitles) {
    if (!olGenreCache.has(olQuery)) {
      try {
        const res  = await fetch(`/api/discover/genre?q=${encodeURIComponent(olQuery)}`);
        const docs = await res.json();
        olGenreCache.set(olQuery, Array.isArray(docs) ? docs : []);
      } catch { olGenreCache.set(olQuery, []); }
    }
    return olGenreCache.get(olQuery).filter(b =>
      b.cover_i && !excludeTitles.has((b.title||'').toLowerCase().trim())
    );
  }

  function makeRecCard(book, genre, color, isOlBook = false) {
    const shelved = onShelf(book);
    const authorStr = book.author || (book.author_name && book.author_name[0]) || '';
    const url = book.cover_i
      ? `https://covers.openlibrary.org/b/id/${book.cover_i}-M.jpg`
      : book.cover_isbn
      ? `https://covers.openlibrary.org/b/isbn/${book.cover_isbn}-M.jpg`
      : null;
    const card = document.createElement('div');
    card.className = 'rec-card' + (shelved ? ' rec-card--shelved' : '');
    card.innerHTML = `
      <div class="rec-card-cover" style="background:${color}">
        ${url ? `<img src="${url}" alt="${escHtml(book.title)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">` : ''}
        <span class="rec-card-initial" ${url ? 'style="display:none"' : ''}>${escHtml((book.title||'?')[0])}</span>
      </div>
      <div class="rec-card-info">
        <div class="rec-card-title">${escHtml(book.title)}</div>
        <div class="rec-card-author">${escHtml(authorStr)}</div>
      </div>
      ${shelved ? '<div class="rec-card-badge">✓ Shelved</div>' : ''}
    `;
    card.addEventListener('click', () =>
      isOlBook ? showSearchModal(book) : showRecModal(book, genre, color)
    );
    return card;
  }

  let renderEpoch = 0;
  const TARGET = 20;

  function renderSections(){
    const epoch = ++renderEpoch;
    sectionsWrap.innerHTML = '';

    // "For You" — only in All view, only when user has shelf activity
    if (activeGenre === 'all' && picks.length) {
      const sect = document.createElement('div');
      sect.className = 'genre-section';
      const h = document.createElement('h2');
      h.className = 'genre-header';
      h.innerHTML = `<span class="genre-dot" style="background:var(--gold)"></span>For You <span class="genre-match-tag">based on your shelf</span>`;
      sect.appendChild(h);
      const grid = document.createElement('div');
      grid.className = 'rec-genre-grid';
      for (const { book, genre, color } of picks)
        grid.appendChild(makeRecCard(book, genre, color));
      sect.appendChild(grid);
      sectionsWrap.appendChild(sect);

      // Pad For You to 20 using top-affinity genre's OL books
      if (picks.length < TARGET) {
        const topGenre = scored.find(s => s.olQuery && (affinity[s.genre] || 0) > 0) || scored[0];
        if (topGenre?.olQuery) {
          const shownTitles = new Set([
            ...forYouTitles, ...shelfTitles,
          ]);
          const capturedGrid = grid;
          const spinEl = document.createElement('div');
          spinEl.className = 'spinner-grid-span';
          spinEl.innerHTML = '<div class="spinner"></div>';
          capturedGrid.appendChild(spinEl);
          fetchOlGenreBooks(topGenre.olQuery, shownTitles).then(olBooks => {
            spinEl.remove();
            if (renderEpoch !== epoch) return;
            for (const b of olBooks.slice(0, TARGET - picks.length))
              capturedGrid.appendChild(makeRecCard(b, topGenre.genre, GENRE_COLORS[topGenre.genre] || '#1F3D2E', true));
          });
        }
      }
    }

    // Feature 9: Because you loved X
    if (activeGenre === 'all') {
      const ratedBooks = Object.values(lists.read || {}).filter(b => (b.rating || 0) >= 4).sort((a, b) => (b.rating || 0) - (a.rating || 0));
      if (ratedBooks.length) {
        const loved = ratedBooks[0];
        const lovedSect = document.createElement('div');
        lovedSect.className = 'genre-section';
        const lh = document.createElement('h2'); lh.className = 'genre-header';
        lh.innerHTML = `<span class="genre-dot" style="background:var(--gold)"></span>Because you loved <em>${escHtml(loved.title)}</em>`;
        lovedSect.appendChild(lh);
        const lg = document.createElement('div'); lg.className = 'rec-genre-grid';
        lg.innerHTML = '<div class="spinner-grid-span"><div class="spinner"></div></div>';
        lovedSect.appendChild(lg);
        sectionsWrap.appendChild(lovedSect);
        const lq = loved.author ? `author:${loved.author}` : loved.title;
        fetch(`/api/search?q=${encodeURIComponent(lq)}`)
          .then(r => r.json())
          .then(books => {
            if (renderEpoch !== epoch) return;
            const filtered = (Array.isArray(books) ? books : []).filter(b => b.cover_i && (b.title || '').toLowerCase() !== (loved.title || '').toLowerCase()).slice(0, 10);
            lg.innerHTML = '';
            if (!filtered.length) { lovedSect.remove(); return; }
            filtered.forEach(b => lg.appendChild(makeRecCard(b, 'Recommendation', '#1F3D2E', true)));
          }).catch(() => lovedSect.remove());
      }
    }

    if (activeGenre === 'all' && readingList.length > 0) {
      const currentBook = readingList[0];
      const readingSect = document.createElement('div');
      readingSect.className = 'genre-section';
      const rh = document.createElement('h2'); rh.className = 'genre-header';
      rh.innerHTML = `<span class="genre-dot" style="background:var(--gold)"></span>Because you're reading <em>${escHtml(currentBook.title)}</em>`;
      readingSect.appendChild(rh);
      const rg = document.createElement('div'); rg.className = 'rec-genre-grid';
      rg.innerHTML = '<div class="spinner-grid-span"><div class="spinner"></div></div>';
      readingSect.appendChild(rg);
      sectionsWrap.appendChild(readingSect);
      const rq = currentBook.author ? `author:${currentBook.author}` : currentBook.title;
      const allShelfTitles = new Set([
        ...Object.values(lists.want).map(b => (b.title||'').toLowerCase()),
        ...Object.values(lists.read).map(b => (b.title||'').toLowerCase()),
        ...Object.values(lists.fav).map(b => (b.title||'').toLowerCase()),
        ...readingList.map(b => (b.title||'').toLowerCase()),
      ]);
      fetch(`/api/search?q=${encodeURIComponent(rq)}`)
        .then(r => r.json())
        .then(books => {
          if (renderEpoch !== epoch) return;
          const filtered = (Array.isArray(books) ? books : []).filter(b =>
            b.cover_i &&
            (b.title||'').toLowerCase() !== (currentBook.title||'').toLowerCase() &&
            !allShelfTitles.has((b.title||'').toLowerCase())
          ).slice(0, 8);
          rg.innerHTML = '';
          if (!filtered.length) { readingSect.remove(); return; }
          filtered.forEach(b => rg.appendChild(makeRecCard(b, 'Recommendation', '#1F3D2E', true)));
        }).catch(() => readingSect.remove());
    }

    // Feature 10: New releases
    if (activeGenre === 'all' && scored.length) {
      const topG = scored[0];
      const newSect = document.createElement('div'); newSect.className = 'genre-section';
      const nh = document.createElement('h2'); nh.className = 'genre-header';
      nh.innerHTML = `<span class="genre-dot" style="background:#c06030"></span>New &amp; Recent in ${escHtml(topG.genre)}`;
      newSect.appendChild(nh);
      const ng = document.createElement('div'); ng.className = 'rec-genre-grid';
      ng.innerHTML = '<div class="spinner-grid-span"><div class="spinner"></div></div>';
      newSect.appendChild(ng);
      sectionsWrap.appendChild(newSect);
      fetch(`/api/discover/new-releases?genre=${encodeURIComponent(topG.genre)}`)
        .then(r => r.json()).then(books => {
          if (renderEpoch !== epoch) return;
          if (!Array.isArray(books) || !books.length) { newSect.remove(); return; }
          ng.innerHTML = '';
          books.forEach(b => ng.appendChild(makeRecCard(b, topG.genre, '#c06030', true)));
        }).catch(() => newSect.remove());
    }

    for (const section of scored){
      // Skip genres not matching the active filter
      if (activeGenre !== 'all' && section.genre !== activeGenre) continue;

      // Exclude books shown in "For You" to prevent repeats
      const notForYou = b => !forYouTitles.has((b.title||'').toLowerCase().trim());

      const unshelved = section.books.filter(b =>
        (b.cover_i || b.cover_isbn) && !onShelf(b) && notForYou(b)
      );
      const shelvedBks = section.books.filter(b =>
        (b.cover_i || b.cover_isbn) && onShelf(b) && notForYou(b)
      );
      const books = [...unshelved, ...shelvedBks];
      if (!books.length && !section.olQuery) continue;

      const color = GENRE_COLORS[section.genre] || '#1F3D2E';
      const sect  = document.createElement('div');
      sect.className = 'genre-section';
      const h = document.createElement('h2');
      h.className = 'genre-header';
      h.innerHTML = `<span class="genre-dot" style="background:${color}"></span>${escHtml(section.genre)}`;
      if (section._count > 0)
        h.innerHTML += ` <span class="genre-match-tag">${section._count} on your shelf</span>`;
      sect.appendChild(h);

      const grid = document.createElement('div');
      grid.className = 'rec-genre-grid';
      for (const book of books)
        grid.appendChild(makeRecCard(book, section.genre, color));
      sect.appendChild(grid);
      sectionsWrap.appendChild(sect);

      // Pad to ~20 with OL books
      if (section.olQuery && books.length < TARGET) {
        const needed = TARGET - books.length;
        const shownTitles = new Set([
          ...forYouTitles,
          ...books.map(b => (b.title||'').toLowerCase().trim()),
        ]);
        const capturedGrid = grid;
        const spinEl = document.createElement('div');
        spinEl.className = 'spinner-grid-span';
        spinEl.innerHTML = '<div class="spinner"></div>';
        capturedGrid.appendChild(spinEl);
        fetchOlGenreBooks(section.olQuery, shownTitles).then(olBooks => {
          spinEl.remove();
          if (renderEpoch !== epoch) return;
          for (const b of olBooks.slice(0, needed))
            capturedGrid.appendChild(makeRecCard(b, section.genre, color, true));
        });
      }
    }
    if (!sectionsWrap.children.length)
      sectionsWrap.innerHTML = '<div class="empty">No books in this genre yet.</div>';
  }

  renderSections();
}

// ── Unified book detail modal ──────────────────────────────────────────────
// Works for both rec books (no OL key yet) and search result books (already have key).
function showBookModal({ title, author, cover_i, cover_isbn, blurb, series, moods, genre,
                         olBook = null, accentColor = '#1F3D2E', pages = null }) {
  const imgUrl = cover_i
    ? `https://covers.openlibrary.org/b/id/${cover_i}-L.jpg`
    : cover_isbn
    ? `https://covers.openlibrary.org/b/isbn/${cover_isbn}-L.jpg`
    : null;

  const overlay = document.createElement('div');
  overlay.className = 'rec-modal-overlay';
  overlay.innerHTML = `
    <div class="rec-modal" role="dialog" aria-modal="true">
      <button class="rec-modal-close" aria-label="Close">✕</button>
      <div class="rec-modal-inner">
        <div class="rec-modal-cover" style="background:${accentColor}">
          ${imgUrl ? `<img src="${imgUrl}" alt="${escHtml(title)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">` : ''}
          <span class="rec-modal-initial" ${imgUrl ? 'style="display:none"' : ''}>${escHtml((title||'?')[0])}</span>
        </div>
        <div class="rec-modal-info">
          ${genre ? `<div class="rec-modal-genre">${escHtml(genre)}</div>` : ''}
          <div class="rec-modal-title">${escHtml(title)}</div>
          ${series ? `<div class="rec-modal-series">${escHtml(series)}</div>` : ''}
          <div class="rec-modal-author">by <span class="author-link" data-author="${escHtml(author||'Unknown')}">${escHtml(author||'Unknown')}</span></div>
        </div>
      </div>
      ${blurb ? `<div class="rec-modal-blurb">${escHtml(blurb)}</div>` : ''}
      <button class="rec-modal-desc-btn" id="modalDescBtn">📖 Read description</button>
      <div class="rec-modal-description" id="modalDesc" style="display:none"></div>
      ${(moods||[]).filter(m=>REC_MOOD_LABELS[m]).length ? `
        <div class="rec-modal-moods">
          ${(moods||[]).filter(m=>REC_MOOD_LABELS[m]).map(m=>`<span class="rec-mood-tag">${REC_MOOD_LABELS[m]}</span>`).join('')}
        </div>` : ''}
      <div class="rec-modal-actions" id="modalActions">
        <span style="font-size:13px;color:#857c68;font-style:italic;">Loading…</span>
      </div>
      <div class="rec-modal-similar" id="modalSimilar" style="display:none">
        <div class="rec-modal-similar-title">You might also like</div>
        <div class="rec-modal-similar-row" id="modalSimilarRow">
          <span style="font-style:italic;color:#9a8e78;font-size:13px;font-family:Georgia,serif;">Finding similar books…</span>
        </div>
      </div>
    </div>
  `;

  function closeModal() {
    overlay.remove();
    document.removeEventListener('keydown', escHandler);
  }
  function escHandler(e) { if (e.key === 'Escape') closeModal(); }
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
  overlay.querySelector('.rec-modal-close').addEventListener('click', closeModal);
  document.addEventListener('keydown', escHandler);
  document.body.appendChild(overlay);

  const modalAuthorLink = overlay.querySelector('.rec-modal-author .author-link');
  if (modalAuthorLink) {
    modalAuthorLink.addEventListener('click', e => {
      e.stopPropagation();
      const a = modalAuthorLink.dataset.author;
      closeModal();
      document.getElementById('searchInput').value = 'author:' + a;
      document.querySelector('[data-tab="search"]').click();
      document.getElementById('searchBtn').click();
    });
  }

  const actionsEl = overlay.querySelector('#modalActions');

  // We render buttons with whatever key we have immediately, then upgrade to
  // the canonical OL key in the background so buttons are never hidden behind "Loading…".
  let currentKey    = olBook ? bookKey(olBook) : null;
  let currentTitle  = (olBook ? olBook.title  : null) || title;
  let currentAuthor = (olBook ? (olBook.author_name||[])[0] : null) || author || '';
  let currentCover  = (olBook ? olBook.cover_i : null) || cover_i || null;
  let currentPages  = olBook?.number_of_pages_median || pages || null;

  function inList(list) { return !!(currentKey && lists[list][currentKey]); }
  function inReading()  { return !!(currentKey && readingList.some(r => r.key === currentKey)); }

  function renderButtons() {
    actionsEl.innerHTML = '';
    const mkBtn = (label, cls, handler) => {
      const b = document.createElement('button');
      b.textContent = label; b.className = cls;
      b.addEventListener('click', handler);
      actionsEl.appendChild(b);
    };

    if (!currentKey) {
      // Still resolving — show disabled placeholders so layout doesn't jump
      ['+ Want to Read','+ Reading','+ Mark as Read','☆ Favourite'].forEach((lbl, i) => {
        const cls = ['rec-modal-btn-want','rec-modal-btn-reading','rec-modal-btn-read','rec-modal-btn-fav'][i];
        const b = document.createElement('button');
        b.textContent = lbl; b.className = cls; b.disabled = true;
        b.style.opacity = '0.45';
        actionsEl.appendChild(b);
      });
      return;
    }

    const k = currentKey, bT = currentTitle, bA = currentAuthor, bC = currentCover, bI = cover_isbn || null, bP = currentPages;

    mkBtn(
      inList('want') ? '✓ Want to Read' : '+ Want to Read',
      'rec-modal-btn-want' + (inList('want') ? ' active' : ''),
      async () => {
        const res = await fetch('/api/lists/want/toggle', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ key:k, title:bT, author:bA, cover_i:bC })
        });
        const r = await res.json();
        if (r.active) {
          lists.want[k] = { title:bT, author:bA, cover_i:bC, key:k };
          for (const gone of (r.removed || [])) {
            if (gone === 'read') delete lists.read[k];
            if (gone === 'reading') readingList = readingList.filter(e => e.key !== k);
          }
          dnfList = dnfList.filter(d => d.key !== k);
        } else { delete lists.want[k]; }
        updateCounts(); renderActiveTab(); renderButtons();
      }
    );

    mkBtn(
      inReading() ? '📖 Reading' : '+ Reading',
      'rec-modal-btn-reading' + (inReading() ? ' active' : ''),
      async () => {
        if (inReading()) {
          await fetch(`/api/reading/${encodeURIComponent(k)}`, { method:'DELETE' });
          readingList = readingList.filter(r => r.key !== k);
        } else {
          await fetch('/api/reading/add', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ key:k, title:bT, author:bA, cover_i:bC, cover_isbn:bI, total_pages:bP })
          });
          readingList.push({ key:k, title:bT, author:bA, cover_i:bC, cover_isbn:bI, current_page:0, total_pages:bP });
          delete lists.want[k]; // reading clears want
          dnfList = dnfList.filter(d => d.key !== k);
        }
        updateCounts(); renderActiveTab(); renderButtons();
      }
    );

    mkBtn(
      inList('read') ? '✓ Already Read' : '+ Mark as Read',
      'rec-modal-btn-read' + (inList('read') ? ' active' : ''),
      async () => {
        const res = await fetch('/api/lists/read/toggle', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ key:k, title:bT, author:bA, cover_i:bC })
        });
        const r = await res.json();
        if (r.active) {
          lists.read[k] = { title:bT, author:bA, cover_i:bC, key:k };
          for (const gone of (r.removed || [])) {
            if (gone === 'want') delete lists.want[k];
            if (gone === 'reading') readingList = readingList.filter(e => e.key !== k);
          }
          dnfList = dnfList.filter(d => d.key !== k);
        } else { delete lists.read[k]; }
        updateCounts(); renderActiveTab(); renderButtons();
      }
    );

    mkBtn(
      inList('fav') ? '★ Favourited' : '☆ Favourite',
      'rec-modal-btn-fav' + (inList('fav') ? ' active' : ''),
      async () => {
        const res = await fetch('/api/lists/fav/toggle', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ key:k, title:bT, author:bA, cover_i:bC })
        });
        const r = await res.json();
        if (r.active) {
          lists.fav[k] = { title:bT, author:bA, cover_i:bC, key:k };
          dnfList = dnfList.filter(d => d.key !== k);
        } else { delete lists.fav[k]; }
        updateCounts(); renderActiveTab(); renderButtons();
      }
    );
  }

  // Render immediately — if we already have an olBook we're done; otherwise show
  // faded placeholders and upgrade to the real OL key in the background.
  renderButtons();

  const descEl  = overlay.querySelector('#modalDesc');
  const descBtn = overlay.querySelector('#modalDescBtn');
  let _resolveDescKey;
  const _descKeyPromise = new Promise(resolve => { _resolveDescKey = resolve; });
  let _descText = null;

  function showDescription(text) {
    if (!text || !descEl) return;
    const clean = text.replace(/\[([^\]]+)\]\([^)]+\)/g, '$1').trim();
    if (blurb) {
      const bp = blurb.trim().slice(0, 80).toLowerCase();
      if (bp && clean.slice(0, 80).toLowerCase() === bp) return;
    }
    let display;
    if (clean.length <= 600) {
      display = clean;
    } else {
      const sub = clean.slice(0, 600);
      const last = Math.max(sub.lastIndexOf('.'), sub.lastIndexOf('!'), sub.lastIndexOf('?'));
      display = last > 100 ? clean.slice(0, last + 1) : sub + '…';
    }
    _descText = display;
    descEl.textContent = display;
    descEl.style.display = '';
    if (descBtn) descBtn.style.display = 'none';
  }

  if (descBtn) {
    descBtn.addEventListener('click', async () => {
      if (_descText) { showDescription(_descText); return; }
      descBtn.textContent = '⏳ Loading…'; descBtn.disabled = true;
      try {
        const wk = await _descKeyPromise;
        if (wk) {
          const r = await fetch(`/api/book/${wk}/description`);
          const d = await r.json();
          if (d.description) showDescription(d.description);
          else { descBtn.textContent = 'No description available'; }
        } else { descBtn.textContent = 'No description available'; }
      } catch { descBtn.textContent = 'No description available'; }
    });
  }

  // Feature 10: Similar books — lazy-loaded via IntersectionObserver so the
  // modal renders instantly and the Open Library fetch only fires once visible.
  const similarSubject = genre
    || (olBook && Array.isArray(olBook.subject) && olBook.subject[0])
    || author
    || null;
  if (similarSubject) {
    const similarEl    = overlay.querySelector('#modalSimilar');
    const similarRowEl = overlay.querySelector('#modalSimilarRow');
    let similarFetched = false;

    const loadSimilar = () => {
      if (similarFetched) return;
      similarFetched = true;
      similarEl.style.display = '';
      fetch(`/api/discover/similar?subject=${encodeURIComponent(similarSubject)}`)
        .then(r => r.json())
        .then(books => {
          if (!Array.isArray(books) || !books.length) { similarEl.style.display = 'none'; return; }
          const filtered = books
            .filter(b => (b.title || '').toLowerCase() !== (title || '').toLowerCase())
            .slice(0, 4);
          if (!filtered.length) { similarEl.style.display = 'none'; return; }
          similarRowEl.innerHTML = '';
          for (const b of filtered) {
            const bUrl = b.cover_i ? `https://covers.openlibrary.org/b/id/${b.cover_i}-M.jpg` : null;
            const card = document.createElement('div');
            card.className = 'rec-modal-similar-card';
            card.innerHTML = `
              <div class="rec-modal-similar-cover">
                ${bUrl ? `<img src="${bUrl}" alt="${escHtml(b.title)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">` : ''}
                <span class="rec-modal-similar-initial" ${bUrl ? 'style="display:none"' : ''}>${escHtml((b.title || '?')[0])}</span>
              </div>
              <div class="rec-modal-similar-card-title">${escHtml(b.title)}</div>
            `;
            card.addEventListener('click', () => { closeModal(); showSearchModal(b); });
            similarRowEl.appendChild(card);
          }
        })
        .catch(() => { similarEl.style.display = 'none'; });
    };

    if ('IntersectionObserver' in window) {
      const io = new IntersectionObserver(([entry]) => {
        if (entry.isIntersecting) { io.disconnect(); loadSimilar(); }
      }, { threshold: 0.1 });
      io.observe(similarEl);
    } else {
      loadSimilar();
    }
  }

  if (olBook) {
    const workKey = (olBook.key || '').replace('/works/', '');
    _resolveDescKey(workKey || null);
  } else {
    (async () => {
      try {
        const res     = await fetch(`/api/search?q=${encodeURIComponent(title + ' ' + (author||''))}`);
        const results = await res.json();
        const ob      = Array.isArray(results) ? results[0] : null;
        if (ob) {
          currentKey    = bookKey(ob);
          currentTitle  = ob.title || title;
          currentAuthor = (ob.author_name||[])[0] || author || '';
          currentCover  = ob.cover_i || cover_i || null;
          currentPages  = ob.number_of_pages_median || pages || null;
          renderButtons();
          const wk = (ob.key || '').replace('/works/', '');
          _resolveDescKey(wk || null);
        } else {
          _resolveDescKey(null);
        }
      } catch (_) { _resolveDescKey(null); }
    })();
  }
}

async function doSearch(){
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  const content = document.getElementById('content');
  content.innerHTML = '<div class="spinner-wrap"><div class="spinner"></div></div>';
  activeTab = 'search';
  setActiveTabUI('search');
  try {
    const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
    if (res.status === 401) { window.location.href = '/index.html'; return; }
    lastResults = await res.json();
    renderActiveTab();
    prefetchSearchCovers(); // background cover lookup for results without covers
  } catch (e) {
    content.innerHTML = '<div class="empty">Search failed. Check your connection and try again.</div>';
  }
}

async function prefetchSearchCovers(){
  const snapshot = lastResults; // capture reference so stale re-renders don't fire
  let updated = false;
  await Promise.all(
    snapshot
      .filter(b => !b.cover_i && !b.cover_isbn)
      .map(async b => {
        const author = b.author_name ? b.author_name[0] : '';
        const result = await lookupCover({ title: b.title, author });
        if (result.cover_i || result.cover_isbn) {
          b.cover_i    = result.cover_i;
          b.cover_isbn = result.cover_isbn;
          updated = true;
        }
      })
  );
  if (updated && activeTab === 'search' && lastResults === snapshot) renderActiveTab();
}

function showFinishRecsPanel(finishedBook) {
  const content = document.getElementById('content');
  const anchor = content.querySelector('.reading-section-title');
  if (!anchor) return;

  const panel = document.createElement('div');
  panel.className = 'finish-recs-panel';
  panel.innerHTML = `
    <div class="finish-recs-header">
      <div class="finish-recs-title">Because you finished <em>${escHtml(finishedBook.title)}</em>:</div>
      <button class="finish-recs-dismiss" aria-label="Dismiss">✕</button>
    </div>
    <div class="finish-recs-grid">
      <div class="spinner-grid-span"><div class="spinner"></div></div>
    </div>
  `;

  panel.querySelector('.finish-recs-dismiss').addEventListener('click', () => panel.remove());
  anchor.insertAdjacentElement('afterend', panel);
  finishRecsPanel = panel;

  const subject = finishedBook.author || finishedBook.title.split(' ')[0];
  const grid = panel.querySelector('.finish-recs-grid');
  fetch(`/api/discover/similar?subject=${encodeURIComponent(subject)}`)
    .then(r => r.json())
    .then(books => {
      if (!panel.isConnected) return;
      const filtered = Array.isArray(books)
        ? books.filter(b => b.cover_i && (b.title||'').toLowerCase() !== (finishedBook.title||'').toLowerCase()).slice(0, 3)
        : [];
      if (!filtered.length) { panel.remove(); return; }
      grid.innerHTML = '';
      for (const b of filtered) {
        const bUrl = `https://covers.openlibrary.org/b/id/${b.cover_i}-M.jpg`;
        const bCard = document.createElement('div');
        bCard.className = 'finish-recs-book';
        bCard.innerHTML = `
          <div class="finish-recs-cover">
            <img src="${bUrl}" alt="${escHtml(b.title)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
            <span class="finish-recs-initial" style="display:none">${escHtml((b.title||'?')[0])}</span>
          </div>
          <div class="finish-recs-book-title">${escHtml(b.title)}</div>
        `;
        bCard.addEventListener('click', () => showSearchModal(b));
        grid.appendChild(bCard);
      }
    })
    .catch(() => { if (panel.isConnected) panel.remove(); });
}

function renderReading(){
  const content = document.getElementById('content');
  content.innerHTML = '';
  const year = new Date().getFullYear();
  const goal  = readingGoal?.goal  ?? null;
  const doneN = readingGoal?.read  ?? 0;

  // ── Goal widget ──
  const goalDiv = document.createElement('div');
  goalDiv.className = 'goal-widget';

  const pct  = goal ? Math.min(100, Math.round((doneN / goal) * 100)) : 0;
  const r = 34, circ = 2 * Math.PI * r;
  const dash = goal ? circ - (pct / 100) * circ : circ;

  goalDiv.innerHTML = `
    <div class="goal-ring-wrap">
      <svg width="80" height="80" viewBox="0 0 80 80">
        <circle cx="40" cy="40" r="${r}" fill="none" stroke="#e8e0cc" stroke-width="7"/>
        <circle cx="40" cy="40" r="${r}" fill="none" stroke="#1F3D2E" stroke-width="7"
          stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${dash.toFixed(1)}"
          stroke-linecap="round" transform="rotate(-90 40 40)"
          style="transition:stroke-dashoffset 0.4s ease"/>
      </svg>
      <div class="goal-ring-label">
        <span class="goal-ring-num">${doneN}</span>
        <span class="goal-ring-denom">${goal ? `of ${goal}` : 'read'}</span>
      </div>
    </div>
    <div class="goal-info">
      <div class="goal-title">${year} Reading Goal</div>
      <div class="goal-sub">${
        goal
          ? doneN >= goal
            ? `Goal complete! You've read ${doneN} book${doneN !== 1 ? 's' : ''} this year.`
            : `${doneN} of ${goal} books — ${goal - doneN} to go`
          : 'No goal set yet.'
      }</div>
      <div class="goal-set-row">
        <input class="goal-input" id="goalInput" type="number" min="1" max="9999"
          placeholder="${goal ?? 'books'}" value="${goal ?? ''}">
        <button class="goal-save-btn" id="goalSaveBtn">${goal ? 'Update goal' : 'Set goal'}</button>
      </div>
    </div>
  `;
  content.appendChild(goalDiv);

  document.getElementById('goalSaveBtn').addEventListener('click', async () => {
    const val = parseInt(document.getElementById('goalInput').value, 10);
    if (!val || val < 1) return;
    await fetch('/api/goals', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ year, goal_books: val }),
    });
    await loadReading();
    renderReading();
  });

  // ── Currently reading section ──
  const secTitle = document.createElement('h2');
  secTitle.className = 'reading-section-title';
  secTitle.textContent = 'Currently Reading';
  content.appendChild(secTitle);

  if (!readingList.length) {
    const empty = document.createElement('div');
    empty.className = 'reading-empty';
    empty.innerHTML = `You're not reading anything right now.<br><span class="reading-add-hint">Search for a book and click "+ Reading" to start tracking.</span>`;
    content.appendChild(empty);
  } else {

  const grid = document.createElement('div');
  grid.className = 'reading-grid';

  for (const book of readingList) {
    const coverUrl = book.cover_i
      ? `https://covers.openlibrary.org/b/id/${book.cover_i}-M.jpg`
      : book.cover_isbn
      ? `https://covers.openlibrary.org/b/isbn/${book.cover_isbn}-M.jpg`
      : null;
    const cp = book.current_page || 0;
    const tp = book.total_pages || 0;
    const pctPages = tp > 0 ? Math.min(100, Math.round((cp / tp) * 100)) : 0;
    const started = book.started_at ? new Date(book.started_at).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' }) : '';

    let paceHtml = '';
    if (cp > 0 && book.started_at) {
      const msElapsed = Date.now() - new Date(book.started_at);
      const daysElapsed = Math.max(0.5, msElapsed / 86400000);
      const ppd = +(cp / daysElapsed).toFixed(1);
      if (ppd >= 0.1) {
        if (tp > cp) {
          const daysLeft = Math.ceil((tp - cp) / ppd);
          paceHtml = `${ppd} pages/day · ~${daysLeft} day${daysLeft !== 1 ? 's' : ''} to finish`;
        } else {
          paceHtml = `${ppd} pages/day`;
        }
      }
    }

    const card = document.createElement('div');
    card.className = 'reading-card';
    card.innerHTML = `
      <div class="reading-cover" style="background:#1F3D2E">
        ${coverUrl
          ? `<img src="${coverUrl}" alt="${escHtml(book.title)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
          : ''}
        <span class="reading-cover-initial" ${coverUrl ? 'style="display:none"' : ''}>${escHtml((book.title||'?')[0])}</span>
      </div>
      <div class="reading-body">
        <div class="reading-title">${escHtml(book.title)}</div>
        <div class="reading-author">${escHtml(book.author || 'Unknown author')}</div>
        ${started ? `<div class="reading-started">Started ${started}</div>` : ''}
        <div class="reading-progress-label">
          <span class="reading-prog-text">${tp > 0 ? `Page ${cp} of ${tp}` : cp > 0 ? `Page ${cp}` : 'Set your page below'}</span>
          <span class="reading-prog-pct">${tp > 0 ? `${pctPages}%` : ''}</span>
        </div>
        <div class="reading-bar-track">
          <div class="reading-bar-fill" style="width:${pctPages}%"></div>
        </div>
        <div class="reading-stepper">
          <button class="reading-step-btn" data-d="-25">−25</button>
          <button class="reading-step-btn" data-d="-10">−10</button>
          <button class="reading-step-btn" data-d="-1">−1</button>
          <input class="reading-page-input" type="number" min="0" max="${tp || 99999}" value="${cp || 0}" title="Current page">
          <button class="reading-step-btn" data-d="1">+1</button>
          <button class="reading-step-btn" data-d="10">+10</button>
          <button class="reading-step-btn" data-d="25">+25</button>
        </div>
        <div class="reading-total-row">
          <span class="reading-total-label">of</span>
          <input class="reading-page-total" type="number" min="1" placeholder="total pages" value="${tp || ''}" title="Total pages">
          <span class="reading-total-suffix">pages</span>
        </div>
        <div class="reading-pace" id="pace-${escHtml(book.key||book.book_key||'')}"></div>
        <div class="reading-actions">
          <button class="reading-finish-btn">✓ Finished</button>
          <button class="reading-dnf-btn reading-remove-btn">Pause</button>
          <button class="reading-remove-btn">Remove</button>
        </div>
      </div>
    `;

    // Shared save helper
    const pageInput  = card.querySelector('.reading-page-input');
    const totalInput = card.querySelector('.reading-page-total');
    const progText   = card.querySelector('.reading-prog-text');
    const progPct    = card.querySelector('.reading-prog-pct');
    const barFill    = card.querySelector('.reading-bar-fill');
    const paceEl     = card.querySelector('.reading-pace');
    if (paceEl && paceHtml) paceEl.textContent = paceHtml;

    async function saveProgress(cpVal, tpVal) {
      await fetch('/api/reading/progress', {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ key: book.key, current_page: cpVal, total_pages: tpVal || null }),
      });
      book.current_page = cpVal;
      if (tpVal) book.total_pages = tpVal;
      const pct = tpVal > 0 ? Math.min(100, Math.round((cpVal / tpVal) * 100)) : 0;
      progText.textContent = tpVal > 0 ? `Page ${cpVal} of ${tpVal}` : cpVal > 0 ? `Page ${cpVal}` : 'Set your page below';
      progPct.textContent  = tpVal > 0 ? `${pct}%` : '';
      barFill.style.width  = `${pct}%`;
      pageInput.max = tpVal || 99999;
      // Recalculate and update the live pace display
      if (paceEl) {
        if (cpVal > 0 && book.started_at) {
          const msElapsed = Date.now() - new Date(book.started_at);
          const daysElapsed = Math.max(0.5, msElapsed / 86400000);
          const ppd = +(cpVal / daysElapsed).toFixed(1);
          if (ppd >= 0.1 && tpVal > cpVal) {
            const daysLeft = Math.ceil((tpVal - cpVal) / ppd);
            paceEl.textContent = `${ppd} pages/day · ~${daysLeft} day${daysLeft !== 1 ? 's' : ''} to finish`;
          } else if (ppd >= 0.1) {
            paceEl.textContent = `${ppd} pages/day`;
          } else {
            paceEl.textContent = '';
          }
        } else {
          paceEl.textContent = '';
        }
      }
    }

    // Step buttons — immediate save
    card.querySelectorAll('.reading-step-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        const delta  = parseInt(btn.dataset.d, 10);
        const tp2    = parseInt(totalInput.value, 10) || book.total_pages || 0;
        let   newCp  = Math.max(0, (parseInt(pageInput.value, 10) || 0) + delta);
        if (tp2 > 0) newCp = Math.min(newCp, tp2);
        pageInput.value = newCp;
        await saveProgress(newCp, tp2 || null);
      });
    });

    // Manual page input — save on blur or Enter
    pageInput.addEventListener('change', async () => {
      const cpVal = Math.max(0, parseInt(pageInput.value, 10) || 0);
      const tp2   = parseInt(totalInput.value, 10) || book.total_pages || null;
      if (tp2 && cpVal > tp2) { pageInput.value = tp2; }
      await saveProgress(Math.min(cpVal, tp2 || cpVal), tp2);
    });

    // Total pages — save on blur
    totalInput.addEventListener('change', async () => {
      const tpVal = Math.max(1, parseInt(totalInput.value, 10) || 0);
      const cpVal = parseInt(pageInput.value, 10) || book.current_page || 0;
      if (tpVal) await saveProgress(cpVal, tpVal);
    });

    // Finish
    card.querySelector('.reading-finish-btn').addEventListener('click', async () => {
      const finishedBook = { title: book.title, author: book.author, key: book.key };
      await fetch('/api/reading/finish', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ key: book.key, title: book.title, author: book.author, cover_i: book.cover_i, total_pages: parseInt(totalInput?.value) || book.total_pages || null }),
      });
      await Promise.all([loadLists(), loadReading()]);
      updateCounts();
      renderReading();
      showFinishRecsPanel(finishedBook);
    });

    // DNF
    card.querySelector('.reading-dnf-btn').addEventListener('click', async () => {
      await fetch('/api/dnf/add', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ key: book.key, title: book.title, author: book.author, cover_i: book.cover_i, cover_isbn: book.cover_isbn }) });
      readingList = readingList.filter(r => r.key !== book.key);
      dnfList.unshift({ key: book.key, title: book.title, author: book.author, cover_i: book.cover_i, cover_isbn: book.cover_isbn, note: null, added_at: new Date().toISOString() });
      updateCounts(); renderReading();
    });

    // Remove
    card.querySelector('.reading-remove-btn:last-child').addEventListener('click', async () => {
      await fetch(`/api/reading/${encodeURIComponent(book.key)}`, { method: 'DELETE' });
      await loadReading();
      updateCounts();
      renderReading();
    });

    card.style.cursor = 'pointer';
    card.addEventListener('click', e => {
      if (e.target.closest('button') || e.target.closest('input')) return;
      showBookModal({
        title: book.title,
        author: book.author || '',
        cover_i: book.cover_i || null,
        cover_isbn: book.cover_isbn || null,
        blurb: null,
        olBook: { key: book.key, title: book.title, author_name: book.author ? [book.author] : [], cover_i: book.cover_i || null },
        accentColor: '#1F3D2E',
        pages: book.total_pages || null,
      });
    });

    grid.appendChild(card);
  }
  content.appendChild(grid);
  } // end else (readingList.length > 0)

  // Paused section — show inside Reading tab
  if (dnfList.length > 0) {
    const pausedSecTitle = document.createElement('h2');
    pausedSecTitle.className = 'reading-section-title';
    pausedSecTitle.textContent = 'Paused';
    pausedSecTitle.style.cssText = 'margin-top:32px;';
    content.appendChild(pausedSecTitle);
    const pausedGrid = document.createElement('div');
    pausedGrid.className = 'grid';
    for (const b of dnfList) {
      const bCoverUrl = b.cover_i
        ? `https://covers.openlibrary.org/b/id/${b.cover_i}-M.jpg`
        : b.cover_isbn
        ? `https://covers.openlibrary.org/b/isbn/${b.cover_isbn}-M.jpg`
        : null;
      const bCard = document.createElement('div');
      bCard.className = 'card';
      bCard.innerHTML = `
        <div class="cover">
          ${bCoverUrl ? `<img src="${escHtml(bCoverUrl)}" alt="${escHtml(b.title)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">` : ''}
          <span class="cover-fallback"${bCoverUrl ? ' style="display:none"' : ''}>${escHtml((b.title||'?')[0])}</span>
        </div>
        <div class="info">
          <div class="title">${escHtml(b.title)}</div>
          <div class="author">${escHtml(b.author || 'Unknown author')}</div>
          <div class="actions">
            <button class="pill paused-resume">+ Resume</button>
            <button class="pill remove paused-del">Remove</button>
          </div>
        </div>`;
      bCard.querySelector('.paused-resume').addEventListener('click', async () => {
        await fetch('/api/reading/add', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ key: b.key, title: b.title, author: b.author, cover_i: b.cover_i, cover_isbn: b.cover_isbn }) });
        await fetch(`/api/dnf/${encodeURIComponent(b.key)}`, { method: 'DELETE' });
        dnfList = dnfList.filter(d => d.key !== b.key);
        readingList.push({ key: b.key, title: b.title, author: b.author, cover_i: b.cover_i, cover_isbn: b.cover_isbn, current_page: 0, total_pages: null, started_at: new Date().toISOString() });
        updateCounts(); renderReading();
      });
      bCard.querySelector('.paused-del').addEventListener('click', async () => {
        await fetch(`/api/dnf/${encodeURIComponent(b.key)}`, { method: 'DELETE' });
        dnfList = dnfList.filter(d => d.key !== b.key);
        updateCounts(); renderReading();
      });
      pausedGrid.appendChild(bCard);
    }
    content.appendChild(pausedGrid);
  }
}

function renderActiveTab(){
  if (activeTab === 'recs') { renderRecommendations(); return; }
  if (activeTab === 'reading') { renderReading(); return; }
  if (activeTab === 'collections') { renderCollections(); return; }

  const content = document.getElementById('content');
  content.innerHTML = '';
  let items = [];
  let filterInput = null;

  if (activeTab === 'search') {
    items = lastResults.map(b => ({ book: b, key: bookKey(b) }));
    if (items.length === 0) {
      content.innerHTML = '<div class="empty">Search for a title or author above to get started.</div>';
      return;
    }
  } else {
    const stored = lists[activeTab];
    items = Object.keys(stored).map(k => ({ book: stored[k], key: k }));
    if (items.length === 0) {
      const labels = {
        want: "No books on your want-to-read list yet.",
        read: "No books marked as read yet.",
        fav:  "No favorites yet."
      };
      content.innerHTML = `<div class="empty">${labels[activeTab]}</div>`;
      return;
    }

    // Sort bar
    const sortOptions = [
      { key: 'date', label: 'Date added' },
      { key: 'title', label: 'Title A–Z' },
      { key: 'author', label: 'Author A–Z' },
      ...(activeTab === 'read' ? [{ key: 'rating', label: 'Rating ↓' }] : []),
    ];
    const sortBar = document.createElement('div');
    sortBar.className = 'sort-bar';
    sortOptions.forEach(opt => {
      const chip = document.createElement('button');
      chip.className = 'sort-chip' + (activeSort === opt.key ? ' active' : '');
      chip.textContent = opt.label;
      chip.addEventListener('click', () => {
        if (activeSort === opt.key) return;
        activeSort = opt.key;
        renderActiveTab();
      });
      sortBar.appendChild(chip);
    });
    if (activeTab === 'read') {
      const filterWrap = document.createElement('div');
      filterWrap.style.cssText = 'margin-bottom:12px;';
      filterInput = document.createElement('input');
      filterInput.type = 'text';
      filterInput.className = 'read-filter-input';
      filterInput.placeholder = 'Filter by title, author, or review…';
      filterWrap.appendChild(filterInput);
      content.appendChild(filterWrap);
    }
    content.appendChild(sortBar);

    // Apply sort
    if (activeSort === 'title') {
      items.sort((a, b) => (a.book.title || '').localeCompare(b.book.title || ''));
    } else if (activeSort === 'author') {
      items.sort((a, b) => (a.book.author || '').localeCompare(b.book.author || ''));
    } else if (activeSort === 'rating') {
      items.sort((a, b) => (b.book.rating || 0) - (a.book.rating || 0));
    }
    // 'date' is default (already ordered by added_at DESC from API)
  }

  const grid = document.createElement('div');
  grid.className = 'grid';
  items.forEach(({book, key}) => grid.appendChild(renderCard(book, key)));
  content.appendChild(grid);

  if (filterInput) {
    filterInput.addEventListener('input', () => {
      const q = filterInput.value.trim().toLowerCase();
      grid.querySelectorAll('.card').forEach(card => {
        const text = card.textContent.toLowerCase();
        card.style.display = q && !text.includes(q) ? 'none' : '';
      });
    });
  }
}
