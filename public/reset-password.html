<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bookshelf — Reset password</title>
<link rel="stylesheet" href="/style.css">
<style>
.msg {
  font-family:Georgia,serif; font-size:14px;
  font-style:italic; margin-top:12px; text-align:center; min-height:20px;
}
.msg.error { color:var(--rust); }
.msg.success { color:var(--forest); }

@keyframes shake {
  0%,100% { transform:translateX(0); }
  20%,60%  { transform:translateX(-7px); }
  40%,80%  { transform:translateX(7px); }
}
.msg.shake { animation: shake 0.38s ease; }

.back-link {
  text-align:center; margin-top:16px; font-size:14px;
}
.back-link a { color:#857c68; text-decoration:underline; }
.back-link a:hover { color:var(--forest); }

#invalidState p {
  font-family:Georgia,serif; font-size:14px;
  font-style:italic; color:var(--rust); line-height:1.6; text-align:center;
}
</style>
</head>
<body class="auth-body">

<div class="auth-card">
  <h1 style="text-align:center;margin:0 0 8px;font-size:36px;">Bookshelf</h1>
  <p id="cardSubtitle" style="text-align:center;color:#857c68;font-style:italic;margin:0 0 28px;font-size:16px;">Choose a new password for your account.</p>

  <!-- Reset form (shown when ?token= is present) -->
  <div id="resetForm">
    <form id="resetFormEl">
      <label style="font-size:15px;color:#5b5448;display:block;margin-bottom:5px;" for="newPassword">New password</label>
      <input type="password" id="newPassword" placeholder="8+ characters, letter and number" autocomplete="new-password" required>
      <label style="font-size:15px;color:#5b5448;display:block;margin-bottom:5px;" for="confirmPassword">Confirm password</label>
      <input type="password" id="confirmPassword" placeholder="Repeat password" autocomplete="new-password" required>
      <button type="submit" class="btn-primary" id="resetBtn" style="margin-top:4px;">Set new password</button>
    </form>
    <p class="msg" id="resetMsg"></p>
  </div>

  <!-- Forgot password form (shown when no token in URL) -->
  <div id="forgotForm" style="display:none">
    <p style="font-size:15px;color:#5b5448;font-style:italic;margin:0 0 20px;line-height:1.6;">Enter your account email address and we&rsquo;ll send you a link to reset your password.</p>
    <form id="forgotFormEl">
      <label style="font-size:15px;color:#5b5448;display:block;margin-bottom:5px;" for="forgotEmail">Email address</label>
      <input type="email" id="forgotEmail" placeholder="you@example.com" autocomplete="email" required>
      <button type="submit" class="btn-primary" id="forgotBtn" style="margin-top:4px;">Send reset link</button>
    </form>
    <p class="msg" id="forgotMsg"></p>
    <p class="back-link"><a href="/">&#8592; Back to sign in</a></p>
  </div>

  <!-- Invalid token state -->
  <div id="invalidState" style="display:none">
    <p>This reset link is invalid or has expired.<br>Please request a new one.</p>
    <p class="back-link"><a href="/reset-password.html">Request a new link</a></p>
  </div>

  <!-- Success state -->
  <div id="successState" style="display:none">
    <p class="msg success" style="margin:0 0 16px">Your password has been updated.</p>
    <a href="/" class="btn-primary" style="text-decoration:none;text-align:center;display:block;">Sign in</a>
  </div>
</div>

<script>
if (localStorage.getItem('darkMode') === 'true') document.documentElement.classList.add('dark');

const params = new URLSearchParams(location.search);
const token  = params.get('token');

if (!token) {
  document.getElementById('resetForm').style.display  = 'none';
  document.getElementById('forgotForm').style.display = 'block';
  document.getElementById('cardSubtitle').textContent = 'Enter your email address to receive a reset link.';
}

document.getElementById('forgotFormEl')?.addEventListener('submit', async (e) => {
  e.preventDefault();
  const email  = document.getElementById('forgotEmail').value.trim();
  const btn    = document.getElementById('forgotBtn');
  const msgEl  = document.getElementById('forgotMsg');
  btn.disabled = true;
  btn.textContent = 'Sending…';
  msgEl.className = 'msg'; msgEl.textContent = '';
  try {
    await fetch('/api/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email }),
    });
    document.getElementById('forgotFormEl').style.display = 'none';
    msgEl.textContent = 'If that email is registered, you’ll receive a reset link shortly. Check your inbox (and spam folder).';
    msgEl.className   = 'msg success';
  } catch {
    msgEl.textContent = 'Could not reach the server. Try again.';
    msgEl.className   = 'msg error';
    btn.disabled = false;
    btn.textContent = 'Send reset link';
  }
});

document.getElementById('resetFormEl')?.addEventListener('submit', async (e) => {
  e.preventDefault();
  const password = document.getElementById('newPassword').value;
  const confirm  = document.getElementById('confirmPassword').value;
  const msgEl    = document.getElementById('resetMsg');
  const btn      = document.getElementById('resetBtn');

  msgEl.className   = 'msg';
  msgEl.textContent = '';

  if (password.length < 8 || !/[a-zA-Z]/.test(password) || !/[0-9]/.test(password)) {
    msgEl.textContent = 'Password must be 8+ characters and include a letter and a number.';
    msgEl.className   = 'msg error';
    return;
  }
  if (password !== confirm) {
    msgEl.textContent = 'Passwords do not match.';
    msgEl.className   = 'msg error';
    void msgEl.offsetWidth;
    msgEl.classList.add('shake');
    return;
  }

  btn.disabled    = true;
  btn.textContent = 'Saving…';

  try {
    const res  = await fetch('/api/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, password }),
    });
    const data = await res.json();
    if (!res.ok) {
      if (res.status === 400 && data.error?.includes('invalid')) {
        document.getElementById('resetForm').style.display    = 'none';
        document.getElementById('invalidState').style.display = 'block';
        return;
      }
      msgEl.textContent = data.error || 'Something went wrong.';
      msgEl.className   = 'msg error';
      btn.disabled      = false;
      btn.textContent   = 'Set new password';
      return;
    }
    document.getElementById('resetForm').style.display    = 'none';
    document.getElementById('successState').style.display = 'block';
  } catch {
    msgEl.textContent = 'Could not reach the server. Try again.';
    msgEl.className   = 'msg error';
    btn.disabled      = false;
    btn.textContent   = 'Set new password';
  }
});
</script>

</body>
</html>
