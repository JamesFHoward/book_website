<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bookshelf — Reset password</title>
<link rel="stylesheet" href="/style.css">
<style>
@keyframes plateReveal {
  0%   { opacity:0; transform:perspective(1000px) rotateY(-8deg) scale(0.95); }
  100% { opacity:1; transform:perspective(1000px) rotateY(0deg)  scale(1); }
}

.auth-card {
  animation: plateReveal 1.4s cubic-bezier(0.22,1,0.36,1) both;
  will-change: transform;
  display: block;
  max-width: 400px;
  width: 100%;
  padding: 0;
  background: #f4edd6;
  border: 2px solid #2c1508;
  box-shadow: 0 30px 80px rgba(0,0,0,0.72), 0 4px 16px rgba(0,0,0,0.40);
  position: relative;
}
.auth-card::after {
  content: '';
  position: absolute;
  inset: 7px;
  border: 1px solid rgba(44,21,8,0.28);
  pointer-events: none;
  z-index: 10;
}
.plate-header {
  text-align: center;
  padding: 28px 36px 18px;
  border-bottom: 1px solid rgba(44,21,8,0.15);
}
.plate-header h1 {
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 22px;
  font-weight: normal;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: #140a02;
  margin: 10px 0 7px;
}
.plate-header p {
  font-family: Georgia, serif;
  font-size: 12.5px;
  font-style: italic;
  color: #5a3518;
  line-height: 1.6;
  margin: 0;
}
.plate-ornament {
  display: flex; align-items: center; gap: 10px; margin: 6px 0;
}
.plate-ornament .orn-line {
  flex: 1; height: 1px;
  background: linear-gradient(to right, transparent, rgba(44,21,8,0.28), transparent);
}
.plate-ornament .orn-gem { color: #7a4018; font-size: 15px; line-height: 1; opacity: 0.75; }

.plate-form { padding: 24px 36px 30px; }

input[type="password"] {
  display: block; width: 100%; box-sizing: border-box;
  background: transparent; border: none;
  border-bottom: 1.5px solid rgba(44,21,8,0.28); border-radius: 0;
  padding: 9px 2px; margin-bottom: 18px;
  font-family: Georgia, serif; font-size: 14px; color: #1a0c04;
  transition: border-color 0.18s, box-shadow 0.18s;
  outline: none;
}
input[type="password"]:focus {
  border-bottom-color: #8b5a2b;
  box-shadow: 0 2px 0 0 rgba(139,90,43,0.18);
}
input::placeholder { color: rgba(44,21,8,0.35); font-style: italic; }

.btn-primary {
  display: block; width: 100%; padding: 11px 0;
  background: #2c1508; color: #f4edd6; border: none;
  font-family: Georgia, serif; font-size: 13.5px;
  letter-spacing: 0.12em; text-transform: uppercase;
  cursor: pointer; position: relative; overflow: hidden;
  transition: background 0.15s, transform 0.12s, box-shadow 0.15s;
}
.btn-primary:not(:disabled):hover {
  background: #4a2410; transform: translateY(-2px);
  box-shadow: 0 6px 18px rgba(44,21,8,0.35);
}
.btn-primary:disabled { opacity:0.55; cursor:default; }

.field-label {
  display: block; font-family: Georgia, serif;
  font-size: 11px; letter-spacing: 0.10em;
  color: rgba(44,21,8,0.55); margin-bottom: 2px;
  text-transform: uppercase;
}

.msg {
  font-family: Georgia, serif; font-size: 12.5px;
  font-style: italic; margin-top: 12px; text-align: center; min-height: 20px;
}
.msg.error { color: #8b1a1a; }
.msg.success { color: #1e4a28; }

@keyframes shake {
  0%,100% { transform:translateX(0); }
  20%,60% { transform:translateX(-7px); }
  40%,80% { transform:translateX(7px); }
}
.msg.shake { animation: shake 0.38s ease; }

.back-link {
  text-align: center; margin-top: 16px;
  font-family: Georgia, serif; font-size: 11.5px;
}
.back-link a { color: rgba(44,21,8,0.45); text-decoration: none; }
.back-link a:hover { color: #2c1508; }

/* Invalid / expired token state */
#invalidState { display: none; text-align: center; padding: 24px 36px 30px; }
#invalidState p {
  font-family: Georgia, serif; font-size: 13px;
  font-style: italic; color: #8b1a1a; line-height: 1.6;
}
</style>
</head>
<body class="auth-body">

<div class="auth-card">
  <div class="plate-header">
    <div class="plate-ornament">
      <span class="orn-line"></span>
      <span class="orn-gem">❧</span>
      <span class="orn-gem" style="font-size:10px;opacity:0.5">✦</span>
      <span class="orn-gem">❧</span>
      <span class="orn-line"></span>
    </div>
    <h1>Reset password</h1>
    <p>Choose a new password for your account.</p>
    <div class="plate-ornament">
      <span class="orn-line"></span>
      <span class="orn-gem">❧</span>
      <span class="orn-gem" style="font-size:10px;opacity:0.5">✦</span>
      <span class="orn-gem">❧</span>
      <span class="orn-line"></span>
    </div>
  </div>

  <!-- Reset form -->
  <div class="plate-form" id="resetForm">
    <form id="resetFormEl">
      <label class="field-label" for="newPassword">New password</label>
      <input type="password" id="newPassword" placeholder="6 characters or more" autocomplete="new-password" required>
      <label class="field-label" for="confirmPassword">Confirm password</label>
      <input type="password" id="confirmPassword" placeholder="Repeat password" autocomplete="new-password" required>
      <button type="submit" class="btn-primary" id="resetBtn">Set new password</button>
    </form>
    <p class="msg" id="resetMsg"></p>
  </div>

  <!-- Invalid token state -->
  <div id="invalidState">
    <p>This reset link is invalid or has expired.<br>Please request a new one.</p>
    <p class="back-link" style="margin-top:16px"><a href="/">← Back to sign in</a></p>
  </div>

  <!-- Success state -->
  <div id="successState" style="display:none" class="plate-form">
    <p class="msg success" style="margin:0 0 16px">Your password has been updated.</p>
    <a href="/" class="btn-primary" style="text-decoration:none;text-align:center;display:block;padding:11px 0">
      Sign in
    </a>
  </div>
</div>

<script>
const params = new URLSearchParams(location.search);
const token  = params.get('token');

if (!token) {
  document.getElementById('resetForm').style.display   = 'none';
  document.getElementById('invalidState').style.display = 'block';
}

document.getElementById('resetFormEl')?.addEventListener('submit', async (e) => {
  e.preventDefault();
  const password  = document.getElementById('newPassword').value;
  const confirm   = document.getElementById('confirmPassword').value;
  const msgEl     = document.getElementById('resetMsg');
  const btn       = document.getElementById('resetBtn');

  msgEl.className     = 'msg';
  msgEl.textContent   = '';

  if (password.length < 6) {
    msgEl.textContent = 'Password must be at least 6 characters.';
    msgEl.className   = 'msg error';
    return;
  }
  if (password !== confirm) {
    msgEl.textContent = 'Passwords do not match.';
    msgEl.className   = 'msg error';
    void msgEl.offsetWidth;
    msgEl.classList.add('shake');
    return;
  }

  btn.disabled    = true;
  btn.textContent = 'Saving…';

  try {
    const res  = await fetch('/api/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, password }),
    });
    const data = await res.json();
    if (!res.ok) {
      if (res.status === 400 && data.error?.includes('invalid')) {
        document.getElementById('resetForm').style.display    = 'none';
        document.getElementById('invalidState').style.display = 'block';
        return;
      }
      msgEl.textContent = data.error || 'Something went wrong.';
      msgEl.className   = 'msg error';
      btn.disabled      = false;
      btn.textContent   = 'Set new password';
      return;
    }
    document.getElementById('resetForm').style.display    = 'none';
    document.getElementById('successState').style.display = 'block';
  } catch {
    msgEl.textContent = 'Could not reach the server. Try again.';
    msgEl.className   = 'msg error';
    btn.disabled      = false;
    btn.textContent   = 'Set new password';
  }
});
</script>

</body>
</html>
